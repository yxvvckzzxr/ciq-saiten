<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src https://fonts.gstatic.com https://cdnjs.cloudflare.com; connect-src 'self' wss://quziopus-default-rtdb.asia-southeast1.firebasedatabase.app https://quziopus-default-rtdb.asia-southeast1.firebasedatabase.app https://firebasestorage.googleapis.com https://*.googleapis.com https://script.google.com https://www.gstatic.com; img-src 'self' data: blob: https://firebasestorage.googleapis.com;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="description" content="QuizOpus - クイズ大会の解答採点を支援するウェブプラットフォーム。リアルタイム採点・成績開示・参加者管理をワンストップで。">
    <meta property="og:title" content="QuizOpus - 解答採点プラットフォーム">
    <meta property="og:description" content="クイズ大会の解答採点を支援するウェブプラットフォーム">
    <meta property="og:type" content="website">
    <meta property="og:image" content="favicon.png">
    <title>QuizOpus - 採点</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="js/config.js"></script>
    <script src="js/crypto.js"></script>
    <script src="js/shared.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/design_system.css">
    <link rel="stylesheet" href="css/pages.css">
</head>

<body>
    <div class="fixed-header">
        <div class="header-left">
            <button class="back-nav-btn" onclick="location.href='judge.html'"><i class="fa-solid fa-chevron-left"></i> 一覧へ</button>
        </div>
        <div class="header-center">
            <div class="q-badge" id="q-badge">- 問</div>
            <div class="answer-badge" id="answer-badge">...</div>
        </div>
        <div class="header-right">
            <div class="progress-text" id="progress-text"></div>
        </div>
    </div>

    <div class="answer-grid" id="answer-grid">
        <div class="loading-state" style="grid-column:1/-1"><i class="fa-solid fa-spinner fa-spin"></i> 読み込み中...</div>
    </div>

    <div class="mobile-action-bar" id="mobile-action-bar">
        <button class="btn" style="background:#1b5e20;color:white;" onclick="scoreSelected('correct')"><i class="fa-solid fa-check"></i><span>正解</span></button>
        <button class="btn" style="background:#c62828;color:white;" onclick="scoreSelected('wrong')"><i class="fa-solid fa-xmark"></i><span>不正解</span></button>
        <button class="btn" style="background:#f57c00;color:white;" onclick="scoreSelected('hold')"><i class="fa-solid fa-triangle-exclamation"></i><span>保留</span></button>
    </div>



    <script src="js/question.js?v=5"></script>
</body>

</html>
