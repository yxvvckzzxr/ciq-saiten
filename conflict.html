<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizOpus</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="js/config.js"></script>
  <script src="js/crypto.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        

        .top-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 20px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            background: #4caf50;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }

        .btn:hover {
            background: #388e3c;
        }

        .btn.secondary {
            background: #0f3460;
            border: 1px solid #444;
        }

        .btn.secondary:hover {
            background: #1a4a7a;
        }

        .counter {
            background: #e65100;
            padding: 6px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-left: auto;
        }

        .conflict-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
        }

        .conflict-card {
            background: #16213e;
            border-radius: 12px;
            padding: 16px;
            border: 2px solid #ff9800;
            cursor: pointer;
            transition: box-shadow 0.2s;
            content-visibility: auto;
            contain-intrinsic-size: 220px 250px;
        }

        .conflict-card.resolved {
            border-color: #4caf50;
            opacity: 0.6;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .q-tag {
            background: #0f3460;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
        }

        .entry-tag {
            background: #1a237e;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 13px;
        }

        .answer-img {
            width: 100%;
            height: 80px;
            object-fit: contain;
            background: white;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .model-answer {
            background: #1b5e20;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            color: #a5d6a7;
            margin-bottom: 10px;
            text-align: center;
        }

        .scorer-votes {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 12px;
        }

        .vote-item {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
            background: #0f3460;
        }

        .vote-correct {
            color: #4caf50;
            font-weight: bold;
        }

        .vote-wrong {
            color: #ef5350;
            font-weight: bold;
        }

        .vote-hold {
            color: #ff9800;
            font-weight: bold;
        }

        .conflict-card.selected {
            box-shadow: 0 0 0 3px #2196f3, 0 0 12px rgba(33, 150, 243, 0.3);
        }

        .final-result {
            text-align: center;
            padding: 8px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            margin-top: 8px;
        }

        .final-result.correct {
            background: #1b5e20;
            color: #4caf50;
        }

        .final-result.wrong {
            background: #3a1b1b;
            color: #ef5350;
        }

        .no-conflict {
            text-align: center;
            padding: 60px;
            color: #aaa;
            font-size: 16px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #aaa;
        }

        .shortcut-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #0f3460;
            border-top: 1px solid #444;
            padding: 8px 20px;
            display: flex;
            gap: 20px;
            justify-content: center;
            font-size: 12px;
            color: #90caf9;
            z-index: 100;
        }
        .shortcut-bar kbd {
            background: #1a237e;
            padding: 2px 8px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 13px;
            margin-right: 4px;
        }
        .preview-overlay { position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:1000;display:none;overflow-y:auto;padding:20px; }
        .preview-overlay.show { display:block; }
        .preview-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:16px; }
        .preview-header h2 { font-size:18px; }
        .preview-close { background:#c62828;border:none;color:white;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:14px; }
        .preview-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px; }
        .preview-grid .pv-item { background:#16213e;border-radius:8px;padding:8px;text-align:center; }
        .preview-grid .pv-item img { width:100%;background:white;border-radius:4px; }
        .preview-grid .pv-item .pv-label { font-size:12px;color:#aaa;margin-top:4px; }
    </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/design_system.css">
</head>

<body>
    <div class="top-bar">
        <button class="btn secondary" onclick="location.href='judge.html'">← 一覧へ</button>
        <h1>要確認一覧</h1>
        <div class="counter" id="counter">読み込み中...</div>
    </div>

    <div id="conflict-grid" class="conflict-grid">
        <div class="loading">読み込み中...</div>
    </div>

    <div class="shortcut-bar">
        <span><kbd>M</kbd> 正解に確定</span>
        <span><kbd>X</kbd> 不正解に確定</span>
        <span><kbd>←→↑↓</kbd> 移動</span>
    </div>

    <script src="js/conflict.js"></script>
</body>

</html>
