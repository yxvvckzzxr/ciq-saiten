<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://*.firebasedatabase.app https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://unpkg.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src https://fonts.gstatic.com https://cdnjs.cloudflare.com; connect-src 'self' wss://*.firebasedatabase.app https://*.firebasedatabase.app https://*.googleapis.com https://www.gstatic.com; frame-src 'self' https://*.firebasedatabase.app https://*.firebaseapp.com; img-src 'self' data: blob:;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="description" content="CIQ - クイズ大会の解答採点を支援するウェブプラットフォーム">
    <meta property="og:title" content="CIQ - 解答採点プラットフォーム">
    <meta property="og:description" content="クイズ大会の解答採点を支援するウェブプラットフォーム">
    <meta property="og:type" content="website">
    <meta property="og:image" content="favicon.png">
    <title>CIQ - 成績照会</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="js/config.js"></script>
    <script src="js/crypto.js"></script>
    <script src="js/shared.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/design_system.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body class="page-wrapper">
    <div class="page-container">
        <div class="page-logo">
            <span class="logo-icon"><i class="fa-solid fa-chart-column"></i></span>
            <h1 id="logo-title"><i class="fa-solid fa-spinner fa-spin"></i> 読み込み中...</h1>
            <div class="logo-sub" id="logo-subtitle">成績照会</div>
        </div>

        <div class="page-card" id="login-card">
            <div class="form-group">
                <label><i class="fa-solid fa-envelope"></i> メールアドレス</label>
                <input type="email" class="page-input" id="f-email" placeholder="example@gmail.com" autocomplete="off">
            </div>
            <div class="form-group">
                <label><i class="fa-solid fa-key"></i> パスワード</label>
                <input type="text" class="page-input" id="pw-input" maxlength="6" placeholder="------" autocomplete="off">
            </div>
            <button class="page-btn" id="submit-btn" onclick="checkDisclosure()"><i class="fa-solid fa-unlock"></i> 成績を確認する</button>
            <div class="page-msg error" id="error-msg"></div>
        </div>

        <div class="page-card result" id="result-card">
            <div class="result-header">
                <div class="result-name" id="result-name"></div>
                <div class="result-score" id="result-score"></div>
                <div class="result-score-label"><i class="fa-solid fa-calculator"></i> 点 / <span id="result-total">100</span>問</div>
            </div>
            <div class="result-grid-label"><i class="fa-solid fa-th"></i> 各問の正誤</div>
            <div class="result-grid" id="result-grid"></div>
            <button class="back-nav-btn" onclick="showLogin()" style="margin:20px auto 0;display:flex"><i class="fa-solid fa-chevron-left"></i> 戻る</button>
        </div>

        <div class="page-footer">Powered by CIQ</div>
    </div>

    <script src="js/disclosure.js"></script>
</body>
</html>
