<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="description" content="CIQ - ページが見つかりません">
    <title>CIQ - 404</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="css/design_system.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body class="page-404">
    <div class="error-container">
        <div class="decoration"><i class="fa-solid fa-ghost"></i></div>
        <div class="error-code">404</div>
        <h1 class="error-title">ページが見つかりません</h1>
        <p class="error-desc">
            お探しのページは移動または削除された可能性があります。<br>
            URLが正しいかご確認ください。
        </p>
        <div class="error-actions">
            <a href="index.html" class="btn"><i class="fa-solid fa-home"></i> トップへ戻る</a>
            <a href="javascript:history.back()" class="btn ghost"><i class="fa-solid fa-arrow-left"></i> 前のページへ</a>
        </div>
    </div>
</body>
</html>
