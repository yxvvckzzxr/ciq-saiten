<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIQ the 13th 採点システム - 管理者</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: sans-serif;
            background: #1a1a2e;
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        .top-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        h1 {
            font-size: 20px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            background: #4caf50;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }

        .btn:hover {
            background: #388e3c;
        }

        .btn:disabled {
            background: #444;
            cursor: not-allowed;
        }

        .btn.secondary {
            background: #0f3460;
            border: 1px solid #444;
        }

        .btn.secondary:hover {
            background: #1a4a7a;
        }

        .section {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .section h2 {
            font-size: 15px;
            color: #aaa;
            margin-bottom: 16px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: #0f3460;
            border-radius: 10px;
            padding: 16px;
            text-align: center;
        }

        .stat-num {
            font-size: 28px;
            font-weight: bold;
        }

        .stat-label {
            font-size: 12px;
            color: #aaa;
            margin-top: 4px;
        }

        .progress-overview {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 3px;
        }

        .po-cell {
            aspect-ratio: 1;
            border-radius: 3px;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            color: #aaa;
        }

        .po-cell.done {
            background: #1b5e20;
            color: white;
        }

        .po-cell.conflict {
            background: #e65100;
            color: white;
        }

        .po-cell.confirmed {
            background: #1a237e;
            color: white;
        }

        .po-cell.inprogress {
            background: #0d47a1;
            color: white;
        }

        .csv-status {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 12px;
        }

        .csv-status.ready {
            color: #4caf50;
        }

        .csv-status.notready {
            color: #ef5350;
        }
    </style>
</head>

<body>
    <div class="top-bar">
        <button class="btn secondary" onclick="location.href='judge.html'">← 一覧へ</button>
        <h1>管理者画面</h1>
    </div>

    <div class="section">
        <h2>採点状況</h2>
        <div class="stats">
            <div class="stat-card">
                <div class="stat-num">100</div>
                <div class="stat-label">総問題数</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="stat-done">-</div>
                <div class="stat-label">完了</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="stat-conflict">-</div>
                <div class="stat-label">要確認</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="stat-confirmed">-</div>
                <div class="stat-label">確定済み</div>
            </div>
        </div>
        <div class="progress-overview" id="progress-overview"></div>
    </div>

    <div class="section">
        <h2>CSV出力</h2>
        <div class="csv-status" id="csv-status">確認中...</div>
        <button class="btn" id="csv-btn" disabled onclick="exportCSV()">CSV出力</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDk-RpKCX5Hd-xNnrso_x5fd3S-vUoWKUc",
            authDomain: "ciq-saiten.firebaseapp.com",
            databaseURL: "https://ciq-saiten-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ciq-saiten",
            storageBucket: "ciq-saiten.firebasestorage.app",
            messagingSenderId: "987606904586",
            appId: "1:987606904586:web:b16876b8963a55a60d94f3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxUODC2F-hbGRvkOZ2EN-XRpatzJOgEwQiZxNvEZ_TFppXrgKN8rd7RcHHdEq9ZX2KW3A/exec';

        const scorerRole = sessionStorage.getItem('scorer_role');
        if (scorerRole !== 'admin') {
            location.href = 'judge.html';
        }

        const po = document.getElementById('progress-overview');
        for (let i = 1; i <= 100; i++) {
            const cell = document.createElement('div');
            cell.className = 'po-cell';
            cell.id = `po-${i}`;
            cell.textContent = i;
            po.appendChild(cell);
        }

        let scoresData = {};
        let entryNumbers = [];

        async function init() {
            const answersSnap = await db.ref('answers').get();
            if (answersSnap.exists()) {
                entryNumbers = Object.keys(answersSnap.val()).map(Number).sort((a, b) => a - b);
            }
            db.ref('scores').on('value', snap => {
                scoresData = snap.val() || {};
                updateView();
            });
        }

        function updateView() {
            let doneCount = 0;
            let conflictCount = 0;
            let confirmedCount = 0;
            let allConfirmed = true;

            for (let q = 1; q <= 100; q++) {
                const completedScorers = Object.keys(scoresData[`__completed__q${q}`] || {});
                const allDone = completedScorers.length >= 3;
                let hasConflict = false;
                let allResolved = true;

                if (allDone) {
                    entryNumbers.forEach(entryNum => {
                        const qScores = scoresData[entryNum]?.[`q${q}`] || {};
                        const vals = Object.values(qScores);
                        const corrects = vals.filter(v => v === 'correct').length;
                        const wrongs = vals.filter(v => v === 'wrong').length;
                        if (corrects > 0 && wrongs > 0) {
                            hasConflict = true;
                            if (!scoresData[`__final__q${q}`]?.[entryNum]) allResolved = false;
                        }
                    });
                }

                const isFullyConfirmed = allDone && (!hasConflict || allResolved);
                const cell = document.getElementById(`po-${q}`);
                cell.className = 'po-cell';

                if (isFullyConfirmed) {
                    cell.classList.add('confirmed');
                    confirmedCount++;
                } else if (hasConflict) {
                    cell.classList.add('conflict');
                    conflictCount++;
                    allConfirmed = false;
                } else if (allDone) {
                    cell.classList.add('done');
                    doneCount++;
                    allConfirmed = false;
                } else if (completedScorers.length > 0) {
                    cell.classList.add('inprogress');
                    allConfirmed = false;
                } else {
                    allConfirmed = false;
                }
            }

            document.getElementById('stat-done').textContent = doneCount + confirmedCount;
            document.getElementById('stat-conflict').textContent = conflictCount;
            document.getElementById('stat-confirmed').textContent = confirmedCount;

            const csvStatus = document.getElementById('csv-status');
            const csvBtn = document.getElementById('csv-btn');

            if (allConfirmed && confirmedCount === 100) {
                csvStatus.textContent = '全問確定済み。CSV出力できます。';
                csvStatus.className = 'csv-status ready';
                csvBtn.disabled = false;
            } else {
                csvStatus.textContent = `未確定の問題があります（確定済み: ${confirmedCount}/100）`;
                csvStatus.className = 'csv-status notready';
                csvBtn.disabled = true;
            }
        }

        async function exportCSV() {
            let masterData = {};
            try {
                const res = await fetch(GAS_URL + '?master=1');
                masterData = await res.json();
            } catch (e) {
                console.warn('マスターデータ取得失敗:', e);
            }

            const results = entryNumbers.map(entryNum => {
                const answers = [];
                for (let q = 1; q <= 100; q++) {
                    const finalData = scoresData[`__final__q${q}`] || {};
                    const qScores = scoresData[entryNum]?.[`q${q}`] || {};
                    let result;
                    if (finalData[entryNum]) {
                        result = finalData[entryNum] === 'correct' ? 1 : 0;
                    } else {
                        const vals = Object.values(qScores);
                        const corrects = vals.filter(v => v === 'correct').length;
                        result = corrects >= 2 ? 1 : 0;
                    }
                    answers.push(result);
                }

                const score = answers.reduce((a, b) => a + b, 0);
                const streaks = [];
                let current = 0;
                answers.forEach(a => {
                    if (a === 1) {
                        current++;
                    } else {
                        if (current > 0) streaks.push(current);
                        current = 0;
                    }
                });
                if (current > 0) streaks.push(current);

                const master = masterData[entryNum] || {};
                return {
                    entryNumber: entryNum,
                    name: master.name || '',
                    affiliation: master.affiliation || '',
                    grade: master.grade || '',
                    score,
                    answers,
                    streaks
                };
            });

            results.sort((a, b) => {
                if (b.score !== a.score) return b.score - a.score;
                for (let i = 0; i < 100; i++) {
                    const diff = b.answers[i] - a.answers[i];
                    if (diff !== 0) return diff;
                }
                return 0;
            });

            const maxStreaks = Math.max(...results.map(r => r.streaks.length), 0);
            const headers = ['順位', '氏名', '所属', '学年', '点数'];
            for (let i = 1; i <= maxStreaks; i++) headers.push(`第${i}連答`);

            const rows = [headers];
            let rank = 1;
            results.forEach((r, idx) => {
                if (idx > 0) {
                    const prev = results[idx - 1];
                    if (prev.score !== r.score) {
                        rank = idx + 1;
                    } else {
                        let diff = false;
                        for (let i = 0; i < 100; i++) {
                            if (prev.answers[i] !== r.answers[i]) { diff = true; break; }
                        }
                        if (diff) rank = idx + 1;
                    }
                }
                const row = [rank, r.name, r.affiliation, r.grade, r.score];
                for (let i = 0; i < maxStreaks; i++) row.push(r.streaks[i] || 0);
                rows.push(row);
            });

            const csv = rows.map(r => r.join(',')).join('\n');
            const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'ciq_result.csv';
            a.click();
        }

        init();
    </script>
</body>

</html>
