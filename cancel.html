<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://*.firebasedatabase.app https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://unpkg.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src https://fonts.gstatic.com https://cdnjs.cloudflare.com; connect-src 'self' wss://*.firebasedatabase.app https://*.firebasedatabase.app https://*.googleapis.com https://www.gstatic.com https://*.execute-api.ap-northeast-1.amazonaws.com; frame-src 'self' https://*.firebasedatabase.app https://*.firebaseapp.com; img-src 'self' data: blob:;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="description" content="CIQ - クイズ大会の解答採点を支援するウェブプラットフォーム">
    <meta property="og:title" content="CIQ - 解答採点プラットフォーム">
    <meta property="og:description" content="クイズ大会の解答採点を支援するウェブプラットフォーム">
    <meta property="og:type" content="website">
    <meta property="og:image" content="og-image.png">
    <title>CIQ - キャンセルフォーム</title>
    <script defer src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script defer src="js/config.js"></script>
    <script defer src="js/crypto.js"></script>
    <script defer src="js/shared.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" media="print" onload="this.media='all'">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=Noto+Sans+JP:wght@400;500;600;800&display=swap">
    <link rel="stylesheet" href="css/design_system.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body class="page-wrapper">
    <div class="page-container">
        <div class="page-logo">
            <span class="logo-icon"><i class="fa-solid fa-user-xmark"></i></span>
            <h1 id="cancel-title"><i class="fa-solid fa-spinner fa-spin"></i> 読み込み中...</h1>
            <div class="logo-sub" id="cancel-subtitle">キャンセルフォーム</div>
        </div>

        <div class="page-card" id="form-card">
            <div class="form-group">
                <label><i class="fa-solid fa-envelope"></i> メールアドレス</label>
                <input type="email" class="page-input" id="f-email" required placeholder="example@gmail.com">
            </div>

            <div class="form-group">
                <label><i class="fa-solid fa-key"></i> パスワード</label>
                <input type="text" class="page-input" id="f-password" required placeholder="------">
            </div>

            <div class="warning-box">
                <i class="fa-solid fa-triangle-exclamation"></i> キャンセルは取り消せません。
            </div>

            <button class="page-btn danger" id="submit-btn" onclick="processCancel()"><i class="fa-solid fa-trash"></i> キャンセルを確定する</button>
            <div class="page-msg" id="status-msg"></div>
        </div>

        <div class="page-footer">Powered by CIQ</div>
    </div>

    <script defer src="js/email.js"></script>
    <script defer src="js/cancel.js"></script>
</body>
</html>
