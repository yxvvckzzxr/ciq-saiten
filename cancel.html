<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizOpus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="js/config.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        .container { width: 100%; max-width: 480px; }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo h1 { font-size: 28px; font-weight: 700; letter-spacing: 1px; }
        .logo p { color: #8e8ea0; font-size: 14px; margin-top: 6px; }

        .card {
            background: rgba(22, 33, 62, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 32px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        
        .form-group { margin-bottom: 20px; }
        label { font-size: 13px; color: #8e8ea0; display: block; margin-bottom: 6px; font-weight: 600; }
        
        input {
            width: 100%; padding: 14px 16px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1); background: rgba(15,52,96,0.6);
            color: white; font-size: 16px; font-family: sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus { outline: none; border-color: #ef5350; box-shadow: 0 0 0 2px rgba(239,83,80,0.2); }
        input::placeholder { color: #555; }

        .submit-btn {
            width: 100%; padding: 16px; border-radius: 12px; border: none;
            background: linear-gradient(135deg, #ef5350, #b71c1c);
            color: white; font-size: 16px; font-weight: 700; cursor: pointer;
            margin-top: 12px; transition: transform 0.15s, box-shadow 0.2s;
            font-family: 'Outfit', sans-serif; letter-spacing: 1px;
        }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(239,83,80,0.4); }
        .submit-btn:active { transform: translateY(0); }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

        .status-msg {
            margin-top: 20px; padding: 16px; border-radius: 10px;
            font-size: 14px; text-align: center; display: none; line-height: 1.5;
        }
        .status-msg.error { background: rgba(239,83,80,0.15); border: 1px solid rgba(239,83,80,0.3); color: #ef5350; }
        .status-msg.success { background: rgba(76,175,80,0.15); border: 1px solid rgba(76,175,80,0.3); color: #81c784; }

        .warning-text { margin-bottom: 24px; font-size: 13px; color: #ffab40; background: rgba(255,171,64,0.1); padding: 12px; border-radius: 8px; border: 1px solid rgba(255,171,64,0.2); }
    </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/design_system.css">
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>エントリーキャンセル</h1>
            <p>Cancellation Form</p>
        </div>

        <div class="card" id="form-card">
            <div class="warning-text">
                <i class="fa-solid fa-triangle-exclamation"></i>️ キャンセルをするとエントリーは無効となり、取り消すことはできません。<br>
                ※ 受付番号は欠番となります。
            </div>

            <div class="form-group">
                <label>受付番号</label>
                <input type="text" id="f-number" required placeholder="例: 12">
            </div>

            <div class="form-group">
                <label>登録メールアドレス</label>
                <input type="email" id="f-email" required placeholder="example@gmail.com">
            </div>

            <div class="form-group">
                <label>パスワード (連携用英数字6桁)</label>
                <input type="text" id="f-password" required placeholder="------">
            </div>

            <button class="submit-btn" id="submit-btn" onclick="processCancel()">キャンセルを確定する</button>
            <div class="status-msg" id="status-msg"></div>
        </div>
    </div>

    <script src="js/cancel.js"></script>
</body>
</html>
