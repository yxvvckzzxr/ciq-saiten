<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src https://fonts.gstatic.com https://cdnjs.cloudflare.com; connect-src 'self' wss://quziopus-default-rtdb.asia-southeast1.firebasedatabase.app https://quziopus-default-rtdb.asia-southeast1.firebasedatabase.app https://firebasestorage.googleapis.com https://*.googleapis.com https://script.google.com https://www.gstatic.com; img-src 'self' data: blob: https://firebasestorage.googleapis.com;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="description" content="QuizOpus - クイズ大会の解答採点を支援するウェブプラットフォーム。リアルタイム採点・成績開示・参加者管理をワンストップで。">
    <meta property="og:title" content="QuizOpus - 解答採点プラットフォーム">
    <meta property="og:description" content="クイズ大会の解答採点を支援するウェブプラットフォーム">
    <meta property="og:type" content="website">
    <meta property="og:image" content="favicon.png">
    <title>QuizOpus - キャンセルフォーム</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="js/config.js"></script>
    <script src="js/crypto.js"></script>
    <script src="js/shared.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/design_system.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body class="page-wrapper">
    <div class="page-container">
        <div class="page-logo">
            <span class="logo-icon"><i class="fa-solid fa-user-xmark"></i></span>
            <h1 id="cancel-title"><i class="fa-solid fa-spinner fa-spin"></i> 読み込み中...</h1>
            <div class="logo-sub" id="cancel-subtitle">キャンセルフォーム</div>
        </div>

        <div class="page-card" id="form-card">
            <div class="warning-box">
                <i class="fa-solid fa-triangle-exclamation"></i> キャンセルをするとエントリーは無効となり、取り消すことはできません。<br>
                <i class="fa-solid fa-circle-info"></i> 受付番号は欠番となります。
            </div>

            <div class="form-group">
                <label><i class="fa-solid fa-hashtag"></i> 受付番号</label>
                <input type="text" class="page-input" id="f-number" required placeholder="例: 12">
            </div>

            <div class="form-group">
                <label><i class="fa-solid fa-key"></i> パスワード (連携用英数字6桁)</label>
                <input type="text" class="page-input" id="f-password" required placeholder="------">
            </div>

            <button class="page-btn danger" id="submit-btn" onclick="processCancel()"><i class="fa-solid fa-trash"></i> キャンセルを確定する</button>
            <div class="page-msg" id="status-msg"></div>
        </div>

        <div class="page-footer">Powered by QuizOpus</div>
    </div>

    <script src="js/cancel.js"></script>
</body>
</html>
