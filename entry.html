<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizOpus - エントリー</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="js/config.js"></script>
    <script src="js/crypto.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/design_system.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .container { width: 100%; max-width: 600px; }

        .logo { text-align: center; margin-bottom: 32px; }
        .logo h1 { font-size: 28px; font-weight: 800; letter-spacing: 0.5px; }
        .logo p { color: var(--text-muted); font-size: 14px; margin-top: 8px; }

        .form-group { margin-bottom: 20px; }
        .form-row { display: flex; gap: 16px; }
        .form-row .form-group { flex: 1; }

        .required::after { content: " *"; color: var(--danger); }

        .hint { font-size: 12px; color: var(--text-muted); margin-top: 6px; }
        
        input[type="email"], textarea {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 12px 14px;
            border-radius: var(--radius-md);
            font-size: 14px;
            width: 100%;
            box-sizing: border-box;
            outline: none;
            transition: all 0.2s ease;
            font-family: var(--font-family);
        }
        input[type="email"]:focus, textarea:focus {
            border-color: var(--primary);
            background: rgba(15, 23, 42, 0.9);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
        textarea { resize: vertical; min-height: 100px; }
        input::placeholder, textarea::placeholder { color: #475569; }

        .checkbox-label {
            display: flex; align-items: flex-start; gap: 10px;
            cursor: pointer; font-size: 13px; color: var(--text-muted); line-height: 1.5;
        }
        .checkbox-label input[type="checkbox"] {
            margin-top: 2px;
        }

        .submit-btn {
            width: 100%; padding: 16px; border-radius: var(--radius-md); border: none;
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: white; font-size: 16px; font-weight: 700; cursor: pointer;
            margin-top: 24px; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: var(--font-family); letter-spacing: 0.5px;
            box-shadow: var(--shadow-md);
        }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-glow); }
        .submit-btn:active { transform: translateY(0); }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

        .status-msg {
            margin-top: 20px; padding: 14px; border-radius: var(--radius-md);
            font-size: 14px; text-align: center; display: none; line-height: 1.5;
        }
        .status-msg.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #f87171; }
        .status-msg.success { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: #34d399; }
        .status-msg.info { background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.3); color: #60a5fa; }

        .result-info-box {
            background: rgba(15, 23, 42, 0.6); padding: 24px;
            border-radius: var(--radius-md); margin-bottom: 24px;
            border: 1px solid var(--glass-border);
        }
        .result-info-box .info-label { color: var(--text-muted); font-size: 12px; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
        .result-info-box .info-value { font-size: 32px; font-weight: 800; color: var(--primary); margin-bottom: 16px; }
        .pw-display {
            font-size: 22px; font-family: 'Courier New', monospace; letter-spacing: 4px; font-weight: bold;
            background: rgba(0,0,0,0.3); padding: 10px 16px; border-radius: var(--radius-sm); color: var(--text-main);
        }
        .pw-warning { color: #f87171; font-size: 12px; font-weight: 700; margin-top: 12px; }
        
        .disabled-msg {
            text-align: center; padding: 40px 20px;
            color: var(--text-muted); font-size: 16px; display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo">
            <h1 id="project-title"><i class="fa-solid fa-pen-to-square"></i> 大会エントリー</h1>
            <p>参加登録フォーム</p>
        </div>

        <div class="glass-panel disabled-msg" id="disabled-card">
            <i class="fa-solid fa-ban" style="font-size:32px; margin-bottom:12px; display:block;"></i>
            <p>エントリーは現在受け付けていません。</p>
        </div>

        <div class="glass-panel" id="form-card">
            <form id="entry-form">
                <div class="form-group">
                    <label class="required"><i class="fa-solid fa-envelope"></i> メールアドレス</label>
                    <input type="email" id="f-email" required placeholder="example@gmail.com">
                    <div class="hint"><i class="fa-solid fa-circle-info"></i> QRコードと開示用パスワードが送信されます。</div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="required"><i class="fa-solid fa-user"></i> 姓 (全角)</label>
                        <input type="text" id="f-family-name" required placeholder="山田">
                    </div>
                    <div class="form-group">
                        <label class="required">名 (全角)</label>
                        <input type="text" id="f-first-name" required placeholder="太郎">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="required">セイ (全角カタカナ)</label>
                        <input type="text" id="f-family-kana" required placeholder="ヤマダ" pattern="^[ァ-ヴー]+$"
                            title="全角カタカナで入力してください">
                    </div>
                    <div class="form-group">
                        <label class="required">メイ (全角カタカナ)</label>
                        <input type="text" id="f-first-kana" required placeholder="タロウ" pattern="^[ァ-ヴー]+$"
                            title="全角カタカナで入力してください">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group" style="flex:2">
                        <label class="required"><i class="fa-solid fa-school"></i> 所属教育機関</label>
                        <input type="text" id="f-affiliation" required placeholder="○○大">
                    </div>
                    <div class="form-group" style="flex:1">
                        <label class="required"><i class="fa-solid fa-graduation-cap"></i> 学年</label>
                        <select id="f-grade" required>
                            <option value="">選択</option>
                            <option value="１年">１年</option>
                            <option value="２年">２年</option>
                            <option value="３年">３年</option>
                            <option value="４年">４年</option>
                            <option value="５年">５年</option>
                            <option value="６年">６年</option>
                            <option value="非表示">非表示</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label class="required"><i class="fa-solid fa-id-badge"></i> エントリーネーム</label>
                    <input type="text" id="f-entry-name" required placeholder="エントリーシートでの表示名">
                </div>

                <div class="form-group">
                    <label><i class="fa-solid fa-comment"></i> 意気込み</label>
                    <input type="text" id="f-message" placeholder="大会への意気込みをどうぞ！(公開されます)">
                </div>

                <div class="form-group">
                    <label><i class="fa-solid fa-message"></i> 運営への連絡 (任意)</label>
                    <textarea id="f-inquiry" placeholder="配慮事項などがあればご記入ください"></textarea>
                </div>

                <div class="form-group" style="margin-top: 24px;">
                    <label class="checkbox-label">
                        <input type="checkbox" id="f-tos" required>
                        <span>私は大会の参加規約に同意し、入力した情報が正確であることを確認しました。<br>
                            <span style="color:#f87171;font-size:12px"><i class="fa-solid fa-circle-exclamation"></i>
                                受付コードはメールで送信されますので、受信可能なアドレスであることを必ず確認してください。</span></span>
                    </label>
                </div>

                <button type="submit" class="submit-btn" id="submit-btn"><i class="fa-solid fa-paper-plane"></i> エントリーを確定する</button>
            </form>
            <div class="status-msg" id="status-msg"></div>
        </div>

        <div class="glass-panel" id="result-card" style="display:none; text-align:center;">
            <h2 style="color: #34d399; margin-bottom: 16px;"><i class="fa-solid fa-circle-check"></i> エントリー完了！</h2>
            <p style="margin-bottom: 24px; color: var(--text-muted);">以下の情報で受付いたしました。<br>メールアドレスにも同じ情報をお送りしています。</p>

            <div class="result-info-box">
                <div class="info-label"><i class="fa-solid fa-hashtag"></i> あなたの受付番号</div>
                <div class="info-value" id="r-entry-number">---</div>

                <div class="info-label"><i class="fa-solid fa-key"></i> 成績開示・キャンセル用パスワード</div>
                <div class="pw-display" id="r-password">------</div>
                <div class="pw-warning"><i class="fa-solid fa-triangle-exclamation"></i> このパスワードは再発行できません。必ずスクリーンショット等で保存してください。</div>
            </div>

            <button class="btn secondary" onclick="location.reload()"><i class="fa-solid fa-rotate-right"></i> 新しいエントリーを行う</button>
        </div>
    </div>

    <script src="js/entry.js"></script>
</body>

</html>
