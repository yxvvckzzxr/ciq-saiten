<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src https://fonts.gstatic.com https://cdnjs.cloudflare.com; connect-src 'self' wss://quziopus-default-rtdb.asia-southeast1.firebasedatabase.app https://quziopus-default-rtdb.asia-southeast1.firebasedatabase.app https://firebasestorage.googleapis.com https://*.googleapis.com https://script.google.com https://www.gstatic.com; img-src 'self' data: blob: https://firebasestorage.googleapis.com;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="description" content="QuizOpus - クイズ大会の解答採点を支援するウェブプラットフォーム。リアルタイム採点・成績開示・参加者管理をワンストップで。">
    <meta property="og:title" content="QuizOpus - 解答採点プラットフォーム">
    <meta property="og:description" content="クイズ大会の解答採点を支援するウェブプラットフォーム">
    <meta property="og:type" content="website">
    <meta property="og:image" content="favicon.png">
    <title>QuizOpus - エントリー</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="js/config.js"></script>
    <script src="js/crypto.js"></script>
    <script src="js/shared.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/design_system.css">
    <link rel="stylesheet" href="css/pages.css">
</head>

<body class="page-wrapper">
    <div class="page-container" style="max-width:600px">
        <div class="page-logo">
            <span class="logo-icon"><i class="fa-solid fa-pen-to-square"></i></span>
            <h1 id="project-title"><i class="fa-solid fa-spinner fa-spin"></i> 読み込み中...</h1>
            <div class="logo-sub" id="project-subtitle">エントリーフォーム</div>
        </div>

        <div class="page-card page-disabled" id="disabled-card" style="display:none">
            <i class="fa-solid fa-door-closed"></i>
            <h2 id="disabled-title">受付は現在停止中です</h2>
            <p id="disabled-detail">管理者が受付を再開するまでお待ちください。</p>
        </div>

        <div class="page-card" id="form-card">
            <form id="entry-form">
                <div class="form-group">
                    <label class="required"><i class="fa-solid fa-envelope"></i> メールアドレス</label>
                    <input type="email" id="f-email" required placeholder="example@gmail.com">
                    <div class="hint"><i class="fa-solid fa-circle-info"></i> QRコードと開示用パスワードが送信されます。</div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="required"><i class="fa-solid fa-user"></i> 姓 (全角)</label>
                        <input type="text" id="f-family-name" required placeholder="山田">
                    </div>
                    <div class="form-group">
                        <label class="required">名 (全角)</label>
                        <input type="text" id="f-first-name" required placeholder="太郎">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="required">セイ (全角カタカナ)</label>
                        <input type="text" id="f-family-kana" required placeholder="ヤマダ" pattern="^[ァ-ヴー]+$"
                            title="全角カタカナで入力してください">
                    </div>
                    <div class="form-group">
                        <label class="required">メイ (全角カタカナ)</label>
                        <input type="text" id="f-first-kana" required placeholder="タロウ" pattern="^[ァ-ヴー]+$"
                            title="全角カタカナで入力してください">
                    </div>
                </div>

                <div id="affiliation-section">
                    <!-- デフォルト: 学校限定モード -->
                    <div class="form-row" id="school-mode-fields">
                        <div class="form-group" style="flex:2">
                            <label class="required"><i class="fa-solid fa-school"></i> 所属教育機関</label>
                            <input type="text" id="f-affiliation" required placeholder="○○大">
                        </div>
                        <div class="form-group" style="flex:1">
                            <label class="required"><i class="fa-solid fa-graduation-cap"></i> 学年</label>
                            <select id="f-grade" class="custom-select" required>
                                <option value="">選択</option>
                                <option value="１年">１年</option>
                                <option value="２年">２年</option>
                                <option value="３年">３年</option>
                                <option value="４年">４年</option>
                                <option value="５年">５年</option>
                                <option value="６年">６年</option>
                                <option value="非表示">非表示</option>
                            </select>
                        </div>
                    </div>
                    <!-- フルオープンモード用（非表示） -->
                    <div class="form-group" id="open-mode-fields" style="display:none">
                        <label class="required"><i class="fa-solid fa-map-location-dot"></i> 都道府県</label>
                        <select id="f-prefecture" class="custom-select">
                            <option value="">選択してください</option>
                            <option value="北海道">北海道</option><option value="青森県">青森県</option><option value="岩手県">岩手県</option>
                            <option value="宮城県">宮城県</option><option value="秋田県">秋田県</option><option value="山形県">山形県</option>
                            <option value="福島県">福島県</option><option value="茨城県">茨城県</option><option value="栃木県">栃木県</option>
                            <option value="群馬県">群馬県</option><option value="埼玉県">埼玉県</option><option value="千葉県">千葉県</option>
                            <option value="東京都">東京都</option><option value="神奈川県">神奈川県</option><option value="新潟県">新潟県</option>
                            <option value="富山県">富山県</option><option value="石川県">石川県</option><option value="福井県">福井県</option>
                            <option value="山梨県">山梨県</option><option value="長野県">長野県</option><option value="岐阜県">岐阜県</option>
                            <option value="静岡県">静岡県</option><option value="愛知県">愛知県</option><option value="三重県">三重県</option>
                            <option value="滋賀県">滋賀県</option><option value="京都府">京都府</option><option value="大阪府">大阪府</option>
                            <option value="兵庫県">兵庫県</option><option value="奈良県">奈良県</option><option value="和歌山県">和歌山県</option>
                            <option value="鳥取県">鳥取県</option><option value="島根県">島根県</option><option value="岡山県">岡山県</option>
                            <option value="広島県">広島県</option><option value="山口県">山口県</option><option value="徳島県">徳島県</option>
                            <option value="香川県">香川県</option><option value="愛媛県">愛媛県</option><option value="高知県">高知県</option>
                            <option value="福岡県">福岡県</option><option value="佐賀県">佐賀県</option><option value="長崎県">長崎県</option>
                            <option value="熊本県">熊本県</option><option value="大分県">大分県</option><option value="宮崎県">宮崎県</option>
                            <option value="鹿児島県">鹿児島県</option><option value="沖縄県">沖縄県</option>
                            <option value="海外">海外</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label class="required"><i class="fa-solid fa-id-badge"></i> エントリーネーム</label>
                    <input type="text" id="f-entry-name" required placeholder="エントリーシートでの表示名">
                    <div id="entry-name-pref-area" style="margin-top:10px;">
                        <!-- JSで動的に注意書きまたはチェックボックスを挿入 -->
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fa-solid fa-comment"></i> 意気込み</label>
                    <input type="text" id="f-message" placeholder="大会への意気込みをどうぞ！(公開されます)">
                </div>

                <div class="form-group">
                    <label><i class="fa-solid fa-message"></i> 運営への連絡 (任意)</label>
                    <textarea id="f-inquiry" placeholder="配慮事項などがあればご記入ください"></textarea>
                </div>

                <div class="form-group" style="margin-top: 24px;">
                    <label class="custom-checkbox">
                        <input type="checkbox" id="f-tos" required>
                        <span class="checkbox-mark"><svg class="checkbox-svg" viewBox="0 0 16 16"><path d="M3 8.5L6.5 12L13 4"></path></svg></span>
                        <div style="flex:1">
                            <span id="tos-text">私は<a id="terms-link" href="terms.html" target="_blank" style="color:#60a5fa;text-decoration:underline">参加規約</a>および<a href="legal.html" target="_blank" style="color:#60a5fa;text-decoration:underline">プライバシーポリシー・利用規約</a>に同意し、入力した情報が正確であることを確認しました。</span><br>
                            <span style="color:#f87171;font-size:12px;display:block;margin-top:4px;"><i class="fa-solid fa-circle-exclamation"></i>
                                受付コードはメールで送信されます。受信可能なアドレスであることを必ず確認してください。</span>
                        </div>
                    </label>
                </div>

                <button type="submit" class="page-btn" id="submit-btn"><i class="fa-solid fa-paper-plane"></i> エントリーを確定する</button>
            </form>
            <div class="page-msg" id="status-msg"></div>
        </div>

        <div class="page-card result-card" id="result-card" style="display:none">
            <h2 class="result-title"><i class="fa-solid fa-circle-check"></i> エントリー完了！</h2>
            <p class="result-desc">以下の情報で受付いたしました。<br>メールアドレスにも同じ情報をお送りしています。</p>

            <div class="result-info-box">
                <div class="info-label"><i class="fa-solid fa-hashtag"></i> あなたの受付番号</div>
                <div class="info-value" id="r-entry-number">---</div>

                <div class="info-label"><i class="fa-solid fa-key"></i> 成績開示・キャンセル用パスワード</div>
                <div class="pw-display" id="r-password">------</div>
                <div class="pw-warning"><i class="fa-solid fa-triangle-exclamation"></i> このパスワードは再発行できません。必ずスクリーンショット等で保存してください。</div>
            </div>

            <button class="btn secondary" onclick="location.reload()"><i class="fa-solid fa-rotate-right"></i> 新しいエントリーを行う</button>
        </div>

        <div class="page-footer">Powered by QuizOpus</div>
    </div>

    <script src="js/entry.js"></script>
</body>

</html>
