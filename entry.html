<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizOpus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="js/config.js"></script>
  <script src="js/crypto.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        

        .container {
            width: 100%;
            max-width: 600px;
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .logo p {
            color: #8e8ea0;
            font-size: 14px;
            margin-top: 6px;
        }

        .card {
            background: rgba(22, 33, 62, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 32px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-row {
            display: flex;
            gap: 16px;
        }

        .form-row .form-group {
            flex: 1;
        }

        label {
            font-size: 14px;
            color: #8e8ea0;
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .required::after {
            content: " *";
            color: #ef5350;
        }

        .hint {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }

        input[type="text"],
        input[type="email"],
        select,
        textarea {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(15, 52, 96, 0.6);
            color: white;
            font-size: 16px;
            font-family: sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #7c5cfc;
            box-shadow: 0 0 0 2px rgba(124, 92, 252, 0.2);
        }

        input::placeholder,
        textarea::placeholder {
            color: #555;
        }

        .checkbox-label {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            cursor: pointer;
            font-size: 14px;
            color: #ccc;
            line-height: 1.4;
            margin-top: 10px;
        }

        .checkbox-label input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-top: 2px;
            cursor: pointer;
            accent-color: #7c5cfc;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #7c5cfc, #a855f7);
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 32px;
            transition: transform 0.15s, box-shadow 0.2s;
            font-family: 'Outfit', sans-serif;
            letter-spacing: 1px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(124, 92, 252, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .status-msg {
            margin-top: 20px;
            padding: 16px;
            border-radius: 10px;
            font-size: 14px;
            text-align: center;
            display: none;
            line-height: 1.5;
        }

        .status-msg.error {
            background: rgba(239, 83, 80, 0.15);
            border: 1px solid rgba(239, 83, 80, 0.3);
            color: #ef5350;
        }

        .status-msg.success {
            background: rgba(76, 175, 80, 0.15);
            border: 1px solid rgba(76, 175, 80, 0.3);
            color: #81c784;
        }

        .status-msg.info {
            background: rgba(33, 150, 243, 0.15);
            border: 1px solid rgba(33, 150, 243, 0.3);
            color: #90caf9;
        }

        .pw-display {
            font-size: 24px;
            font-family: monospace;
            letter-spacing: 3px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            color: #fff;
        }

        .disabled-msg {
            text-align: center;
            padding: 40px 20px;
            color: #8e8ea0;
            font-size: 16px;
            display: none;
        }
    </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/design_system.css">
</head>

<body>
    <div class="container">
        <div class="logo">
            <h1 id="project-title">大会エントリー</h1>
            <p>エントリー</p>
        </div>

        <div class="card disabled-msg" id="disabled-card">
            <p>🛑 エントリーは現在受け付けていません。</p>
        </div>

        <div class="card" id="form-card">
            <form id="entry-form">
                <div class="form-group">
                    <label class="required">メールアドレス</label>
                    <input type="email" id="f-email" required placeholder="example@gmail.com">
                    <div class="hint">QRコードと開示用パスワードが送信されます。</div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="required">姓 (全角)</label>
                        <input type="text" id="f-family-name" required placeholder="山田">
                    </div>
                    <div class="form-group">
                        <label class="required">名 (全角)</label>
                        <input type="text" id="f-first-name" required placeholder="太郎">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="required">セイ (全角カタカナ)</label>
                        <input type="text" id="f-family-kana" required placeholder="ヤマダ" pattern="^[ァ-ヴー]+$"
                            title="全角カタカナで入力してください">
                    </div>
                    <div class="form-group">
                        <label class="required">メイ (全角カタカナ)</label>
                        <input type="text" id="f-first-kana" required placeholder="タロウ" pattern="^[ァ-ヴー]+$"
                            title="全角カタカナで入力してください">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group" style="flex:2">
                        <label class="required">所属教育機関</label>
                        <input type="text" id="f-affiliation" required placeholder="○○大">
                    </div>
                    <div class="form-group" style="flex:1">
                        <label class="required">学年</label>
                        <select id="f-grade" required>
                            <option value="">選択してください</option>
                            <option value="１年">１年</option>
                            <option value="２年">２年</option>
                            <option value="３年">３年</option>
                            <option value="４年">４年</option>
                            <option value="５年">５年</option>
                            <option value="６年">６年</option>
                            <option value="非表示">非表示</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label class="required">エントリーネーム</label>
                    <input type="text" id="f-entry-name" required placeholder="エントリーシートでの表示名">
                </div>

                <div class="form-group">
                    <label>意気込み</label>
                    <input type="text" id="f-message" placeholder="大会への意気込みをどうぞ！(公開されます)">
                </div>

                <div class="form-group">
                    <label>運営への連絡 (任意)</label>
                    <textarea id="f-inquiry" placeholder="配慮事項などがあればご記入ください"></textarea>
                </div>

                <div class="form-group" style="margin-top: 24px;">
                    <label class="checkbox-label">
                        <input type="checkbox" id="f-tos" required>
                        <span>私は大会の参加規約に同意し、入力した情報が正確であることを確認しました。<br>
                            <span style="color:#ef5350;font-size:12px">※
                                受付コードはメールで送信されますので、受信可能なアドレスであることを必ず確認してください。</span></span>
                    </label>
                </div>

                <button type="submit" class="submit-btn" id="submit-btn">エントリーを確定する</button>
            </form>
            <div class="status-msg" id="status-msg"></div>
        </div>

        <div class="card result" id="result-card" style="display:none; text-align:center;">
            <h2 style="color: #81c784; margin-bottom: 16px;"><i class="fa-solid fa-check"></i> エントリー完了！</h2>
            <p style="margin-bottom: 24px; color: #ccc;">以下の情報で受付いたしました。<br>メールアドレスにも同じ情報をお送りしています。</p>

            <div style="background: rgba(0,0,0,0.2); padding: 20px; border-radius: 12px; margin-bottom: 24px;">
                <p style="color: #aaa; font-size: 13px; margin-bottom: 4px;">あなたの受付番号</p>
                <div style="font-size: 36px; font-weight: bold; color: #7c5cfc; margin-bottom: 16px;"
                    id="r-entry-number">---</div>

                <p style="color: #aaa; font-size: 13px; margin-bottom: 4px;">成績開示・キャンセル用パスワード</p>
                <div class="pw-display" id="r-password">------</div>
                <p style="color: #ef5350; font-size: 12px; font-weight:bold;">※ このパスワードは再発行できません。必ずスクリーンショット等で保存してください。
                </p>
            </div>

            <button class="submit-btn" style="background: transparent; border: 2px solid #7c5cfc;"
                onclick="location.reload()">新しいエントリーを行う</button>
        </div>
    </div>

    <script src="js/entry.js"></script>
</body>

</html>
