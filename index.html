<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://*.firebasedatabase.app https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://unpkg.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src https://fonts.gstatic.com https://cdnjs.cloudflare.com; connect-src 'self' wss://*.firebasedatabase.app https://*.firebasedatabase.app https://*.googleapis.com https://www.gstatic.com; frame-src 'self' https://*.firebasedatabase.app https://*.firebaseapp.com; img-src 'self' data: blob:;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="description" content="CIQ - クイズ大会の解答採点を支援するウェブプラットフォーム">
    <meta property="og:title" content="CIQ - 解答採点プラットフォーム">
    <meta property="og:description" content="クイズ大会の解答採点を支援するウェブプラットフォーム">
    <meta property="og:type" content="website">
    <meta property="og:image" content="og-image.png">
  <title>CIQ - ログイン</title>
  <script defer src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script defer src="js/config.js"></script>
  <script defer src="js/crypto.js"></script>
  <script defer src="js/shared.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" media="print" onload="this.media='all'">
  <link rel="stylesheet" href="css/design_system.css">
    <link rel="stylesheet" href="css/pages.css">
</head>

<body class="page-index">
  <h1>CIQ</h1>
  <p class="subtitle">解答採点プラットフォーム</p>

  <div class="card">
    <div id="status-msg" class="status-msg-box"></div>

    <!-- タブUI -->
    <div class="tabs" id="tabs-container">
      <div class="tab active" id="tab-join" onclick="setTab('join')">参加する</div>
      <div class="tab" id="tab-create" onclick="setTab('create')">新規作成</div>
    </div>

    <!-- 参加セクション -->
    <div id="section-join">
      <label>プロジェクトID</label>
      <input type="text" id="join-id" placeholder="例: a1b2-c3d4-e5f6-g7h8" />
      
      <label>アクセスコード / パスワード</label>
      <div class="password-field-wrap">
        <input type="password" id="join-password" placeholder="合言葉" />
        <span class="password-toggle" onclick="togglePassword('join-password', 'toggle-icon-join')"><i class="fas fa-eye" id="toggle-icon-join"></i></span>
      </div>
      <div class="magic-text"><i class="fa-solid fa-wand-magic-sparkles magic-icon"></i> パスワードの種類から権限を自動判定します</div>
      
      <label>あなたのお名前</label>
      <input type="text" id="join-name" placeholder="例：山田太郎" />
      
      <button class="btn" id="login-btn" onclick="joinProject()">部屋へ入る <i class="fa-solid fa-arrow-right-to-bracket"></i></button>
    </div>

    <!-- 新規作成セクション -->
    <div id="section-create" hidden>
      <label>回数（例：第13回 → 13）</label>
      <input type="number" id="create-edition" placeholder="13" min="1" max="999" />
      <div class="magic-text"><i class="fa-solid fa-wand-magic-sparkles magic-icon"></i> プロジェクトIDと大会名が自動生成されます</div>

      <label>あなたのお名前（最初のシステム作成者）</label>
      <input type="text" id="create-name" placeholder="例：山田太郎" />

      <button class="btn" id="create-btn" onclick="createProject()">新しいプロジェクトを作成 <i class="fa-solid fa-plus"></i></button>
    </div>

    <!-- 作成完了セクション -->
    <div id="section-success" hidden style="text-align: center;">
      <div class="success-icon"><i class="fa-solid fa-circle-check"></i></div>
      <h3 class="success-title">作成完了！</h3>
      <p class="success-desc">以下の情報を安全な場所に保存してください。</p>
      
      <div class="credential-panel" data-stagger>
        <label><i class="fa-solid fa-fingerprint"></i> プロジェクトID</label>
        <div class="credential-row">
          <input type="text" id="success-id" readonly />
          <button class="btn standard credential-copy-btn" onclick="copyToClipboard('success-id', this)"><i class="fa-solid fa-copy"></i></button>
        </div>
        <label><i class="fa-solid fa-crown crown-icon"></i> 管理者用 マスターパスワード</label>
        <div class="credential-row">
          <input type="text" id="success-admin-pwd" readonly />
          <button class="btn master credential-copy-btn" onclick="copyToClipboard('success-admin-pwd', this)"><i class="fa-solid fa-copy"></i></button>
        </div>
        <label><i class="fa-solid fa-users"></i> 採点者用 アクセスコード</label>
        <div class="credential-row">
          <input type="text" id="success-pwd" readonly />
          <button class="btn standard credential-copy-btn" onclick="copyToClipboard('success-pwd', this)"><i class="fa-solid fa-copy"></i></button>
        </div>
      </div>
      <button class="btn" onclick="location.href='admin.html'">管理画面へ進む <i class="fa-solid fa-gear"></i></button>
    </div>


  </div>
  <div style="margin-top: 24px; text-align: center;">
    <a href="help.html" style="color: #64748b; font-size: 12px; text-decoration: none;">
      <i class="fa-solid fa-circle-question"></i> ヘルプ
    </a>
  </div>
  <script defer src="js/index.js"></script>
</body>
</html>
