<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CIQ the 13th 採点システム</title>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="js/config.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: sans-serif;
      background: #1a1a2e;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    p {
      color: #aaa;
      margin-bottom: 32px;
      font-size: 14px;
    }

    .card {
      background: #16213e;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 400px;
    }

    label {
      font-size: 14px;
      color: #aaa;
      display: block;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #0f3460;
      color: white;
      font-size: 16px;
      margin-bottom: 16px;
    }

    input:focus {
      outline: none;
      border-color: #4caf50;
    }

    .tabs {
      display: flex;
      width: 100%;
      margin-bottom: 24px;
      border-bottom: 2px solid #444;
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: 12px;
      color: #aaa;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s;
    }

    .tab.active {
      color: #4caf50;
      border-bottom: 2px solid #4caf50;
      margin-bottom: -2px;
    }

    .role-select {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    .role-btn {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: 2px solid #444;
      background: transparent;
      color: #aaa;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .role-btn.selected {
      border-color: #4caf50;
      color: white;
      background: #1b5e20;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      border: none;
      background: #4caf50;
      color: white;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn:hover {
      background: #388e3c;
    }

    .btn:disabled {
      background: #444;
      cursor: not-allowed;
    }
  </style>
</head>

<body>
  <h1>解答採点プラットフォーム</h1>
  <p>プロジェクトを作成するか、IDを入力して参加してください</p>
  
  <div class="card">
    <div class="tabs">
      <div class="tab active" id="tab-join" onclick="setTab('join')">参加する</div>
      <div class="tab" id="tab-create" onclick="setTab('create')">新規作成</div>
    </div>

    <!-- 参加セクション -->
    <div id="section-join">
      <label>プロジェクトID</label>
      <input type="text" id="join-id" placeholder="例: project-1234" />
      <label>パスワード</label>
      <input type="password" id="join-password" placeholder="アクセスコード" />
      <label>あなたの名前</label>
      <input type="text" id="join-name" placeholder="例：山田太郎" />
      <label>ご自身のロール（入室後の権限）</label>
      <div class="role-select">
        <button class="role-btn selected" id="btn-scorer-join" onclick="selectRole('scorer')">採点者</button>
        <button class="role-btn" id="btn-admin-join" onclick="selectRole('admin')">管理者</button>
      </div>
      <button class="btn" id="login-btn" onclick="joinProject()">入室する</button>
    </div>

    <!-- 新規作成セクション -->
    <div id="section-create" style="display: none;">
      <label>プロジェクト名（大会名など）</label>
      <input type="text" id="create-project-name" placeholder="例：第13回 全日本大会" />
      <label>パスワード（他人の不正アクセスを防ぐ）</label>
      <input type="password" id="create-password" placeholder="任意のパスワード" />
      <label>あなたの名前（最初の作成者）</label>
      <input type="text" id="create-name" placeholder="例：山田太郎" />
      <div class="role-select" style="display:none">
        <button class="role-btn selected" id="btn-scorer-create" onclick="selectRole('admin')">管理者</button>
      </div>
      <button class="btn" onclick="createProject()">システムを新設する</button>
  </div>
  <script>
let selectedRole = 'scorer';
    let currentTab = 'join';

    function setTab(tab) {
      currentTab = tab;
      document.getElementById('tab-join').className = tab === 'join' ? 'tab active' : 'tab';
      document.getElementById('tab-create').className = tab === 'create' ? 'tab active' : 'tab';
      document.getElementById('section-join').style.display = tab === 'join' ? 'block' : 'none';
      document.getElementById('section-create').style.display = tab === 'create' ? 'block' : 'none';
    }

    function selectRole(role) {
      selectedRole = role;
      document.getElementById('btn-scorer-join').className = role === 'scorer' ? 'role-btn selected' : 'role-btn';
      document.getElementById('btn-admin-join').className = role === 'admin' ? 'role-btn selected' : 'role-btn';
    }

    async function joinProject() {
      const pid = document.getElementById('join-id').value.trim();
      const pwd = document.getElementById('join-password').value;
      const name = document.getElementById('join-name').value.trim();

      if (!pid || !pwd || !name) {
        alert('全ての項目を入力してください');
        return;
      }

      const snap = await db.ref('projects/' + pid + '/settings').get();
      if (!snap.exists()) {
        alert('指定されたプロジェクトIDが見つかりません');
        return;
      }

      const settings = snap.val();
      const pwdHash = await hashPassword(pwd);
      // 旧平文パスワードとの後方互換性を維持
      if (settings.passwordHash ? settings.passwordHash !== pwdHash : settings.password !== pwd) {
        alert('パスワードが間違っています');
        return;
      }

      // ログイン成功
      session.set('projectId', pid);
      session.set('scorer_name', name);
      session.set('scorer_role', selectedRole);
      location.href = selectedRole === 'admin' ? 'judge.html' : 'judge.html';
    }

    async function createProject() {
      const pName = document.getElementById('create-project-name').value.trim();
      const pwd = document.getElementById('create-password').value;
      const name = document.getElementById('create-name').value.trim();

      if (!pName || !pwd || !name) {
        alert('全ての項目を入力してください');
        return;
      }

      // ランダムなIDを生成
      const pid = Math.random().toString(36).substring(2, 10).toLowerCase();

      const pwdHash = await hashPassword(pwd);
      await db.ref('projects/' + pid + '/settings').set({
        projectName: pName,
        passwordHash: pwdHash,
        createdAt: firebase.database.ServerValue.TIMESTAMP,
        adminCreator: name
      });

      alert(`プロジェクトが作成されました！\n\n参加ID: ${pid}\nパスワード: ${pwd}\n\n※このIDを他のスタッフに共有してください`);

      session.set('projectId', pid);
      session.set('scorer_name', name);
      session.set('scorer_role', 'admin');
      
      // 作成直後は設定画面（旧saiten.html）へ強制遷移してPDF等を作ってもらう
      location.href = 'saiten.html';
    }

    // エンターキー対応（IME変換確定のEnterを無視）
    let justComposed = false;
    document.addEventListener('compositionend', () => {
      justComposed = true;
      setTimeout(() => justComposed = false, 300);
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        if (e.isComposing || justComposed) return;
        if (currentTab === 'join') {
          joinProject();
        } else {
          createProject();
        }
      }
    });

  </script>
</body>

</html>
