<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CIQ the 13th 採点システム</title>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: sans-serif;
      background: #1a1a2e;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    p {
      color: #aaa;
      margin-bottom: 32px;
      font-size: 14px;
    }

    .card {
      background: #16213e;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 400px;
    }

    label {
      font-size: 14px;
      color: #aaa;
      display: block;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #0f3460;
      color: white;
      font-size: 16px;
      margin-bottom: 16px;
    }

    input:focus {
      outline: none;
      border-color: #4caf50;
    }

    .role-select {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    .role-btn {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: 2px solid #444;
      background: transparent;
      color: #aaa;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .role-btn.selected {
      border-color: #4caf50;
      color: white;
      background: #1b5e20;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      border: none;
      background: #4caf50;
      color: white;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn:hover {
      background: #388e3c;
    }

    .btn:disabled {
      background: #444;
      cursor: not-allowed;
    }
  </style>
</head>

<body>
  <h1>CIQ the 13th 採点システム</h1>
  <p>名前とロールを選択してください</p>
  <div class="card">
    <label>名前</label>
    <input type="text" id="name-input" placeholder="例：山田太郎" />
    <label>ロール</label>
    <div class="role-select">
      <button class="role-btn selected" id="btn-scorer" onclick="selectRole('scorer')">採点者</button>
      <button class="role-btn" id="btn-admin" onclick="selectRole('admin')">管理者</button>
    </div>
    <button class="btn" id="login-btn" onclick="login()">入室する</button>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDk-RpKCX5Hd-xNnrso_x5fd3S-vUoWKUc",
      authDomain: "ciq-saiten.firebaseapp.com",
      databaseURL: "https://ciq-saiten-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "ciq-saiten",
      storageBucket: "ciq-saiten.firebasestorage.app",
      messagingSenderId: "987606904586",
      appId: "1:987606904586:web:b16876b8963a55a60d94f3"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let selectedRole = 'scorer';

    function selectRole(role) {
      selectedRole = role;
      document.getElementById('btn-scorer').classList.toggle('selected', role === 'scorer');
      document.getElementById('btn-admin').classList.toggle('selected', role === 'admin');
    }

    function login() {
      const name = document.getElementById('name-input').value.trim();
      if (!name) {
        alert('名前を入力してください');
        return;
      }

      // セッションに保存
      sessionStorage.setItem('scorer_name', name);
      sessionStorage.setItem('scorer_role', selectedRole);

      // 採点画面へ
      window.location.href = 'judge.html';
    }
  </script>
</body>

</html>
