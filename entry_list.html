<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://*.firebasedatabase.app https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://unpkg.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src https://fonts.gstatic.com https://cdnjs.cloudflare.com; connect-src 'self' wss://*.firebasedatabase.app https://*.firebasedatabase.app https://*.googleapis.com https://www.gstatic.com; frame-src 'self' https://*.firebasedatabase.app https://*.firebaseapp.com; img-src 'self' data: blob:;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="description" content="CIQ - クイズ大会の解答採点を支援するウェブプラットフォーム">
    <meta property="og:title" content="CIQ - 解答採点プラットフォーム">
    <meta property="og:description" content="クイズ大会の解答採点を支援するウェブプラットフォーム">
    <meta property="og:type" content="website">
    <meta property="og:image" content="og-image.png">
    <title>CIQ - エントリーリスト</title>
    <script defer src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script defer src="js/config.js"></script>
    <script defer src="js/shared.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" media="print" onload="this.media='all'">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=Noto+Sans+JP:wght@400;500;600;800&display=swap">
    <link rel="stylesheet" href="css/design_system.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body class="page-wrapper">
    <div class="page-container full">
        <div class="page-logo">
            <span class="logo-icon"><i class="fa-solid fa-list"></i></span>
            <h1 id="page-title"><i class="fa-solid fa-spinner fa-spin"></i> 読み込み中...</h1>
            <div class="logo-sub" id="page-subtitle">エントリーリスト</div>
        </div>

        <div id="content-area" style="display:none">
            <div style="text-align:center">
                <div class="stat-badge glass-panel">
                    <span class="stat-val" id="total-count">-</span>
                    <span class="stat-label"><i class="fa-solid fa-user-check"></i> 名 エントリー済</span>
                </div>
            </div>

            <div class="list-container">
                <table>
                    <thead>
                        <tr>
                            <th><i class="fa-solid fa-trophy"></i> 優先順位</th>
                            <th><i class="fa-regular fa-calendar"></i> エントリー日時</th>
                            <th><i class="fa-solid fa-school"></i> 所属</th>
                            <th><i class="fa-solid fa-graduation-cap"></i> 学年</th>
                            <th><i class="fa-solid fa-id-badge"></i> エントリーネーム</th>
                            <th><i class="fa-solid fa-comment"></i> 意気込み</th>
                            <th><i class="fa-solid fa-map-location-dot"></i> 中部</th>
                        </tr>
                    </thead>
                    <tbody id="list-body">
                        <tr><td colspan="7" style="text-align:center;color:var(--text-muted);padding:32px"><i class="fa-solid fa-spinner fa-spin"></i> 読み込み中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="page-card page-disabled" id="disabled-msg">
            <i class="fa-solid fa-lock"></i>
            現在エントリーリストは非公開です。
        </div>

        <div class="page-footer">Powered by CIQ</div>
    </div>

    <script defer src="js/entry_list.js"></script>
</body>
</html>
