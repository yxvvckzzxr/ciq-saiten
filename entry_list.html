<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizOpus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="js/config.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        .container { width: 100%; max-width: 900px; margin: 0 auto; }
        
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 32px; font-weight: 700; letter-spacing: 1px; margin-bottom: 8px; }
        .header p { color: #8e8ea0; font-size: 15px; }

        .stat-card {
            background: rgba(22, 33, 62, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 16px 24px;
            border-radius: 12px;
            display: inline-block;
            margin-bottom: 24px;
        }
        .stat-val { font-size: 24px; font-weight: bold; color: #7c5cfc; }
        .stat-label { font-size: 13px; color: #8e8ea0; margin-left: 8px; }

        .list-container {
            background: rgba(22, 33, 62, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 16px; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { background: rgba(0,0,0,0.2); font-weight: 600; color: #aaa; white-space: nowrap; }
        td { color: #f5f5f5; vertical-align: middle; }
        
        .c-time { color: #888; font-size: 12px; white-space: nowrap; }
        .c-name { font-size: 16px; font-weight: bold; }
        .c-affil { color: #90caf9; }
        .c-msg { font-size: 13px; color: #ccc; line-height: 1.4; word-break: break-word; }

        .disabled-msg { text-align: center; padding: 60px 20px; color: #8e8ea0; font-size: 16px; }
        
        @media (max-width: 600px) {
            table, thead, tbody, th, td, tr { display: block; }
            thead tr { display: none; }
            tr { padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); }
            td { padding: 4px 0; border: none; }
            .c-time { margin-bottom: 6px; }
            .c-affil, .c-grade { display: inline-block; margin-right: 8px; font-size: 13px; }
            .c-msg { margin-top: 8px; padding-top: 8px; border-top: 1px dashed rgba(255,255,255,0.1); }
        }
    </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/design_system.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 id="page-title">エントリーリスト</h1>
            <p>※ リアルタイム更新</p>
        </div>

        <div id="content-area" style="display:none">
            <div style="text-align: center;">
                <div class="stat-card">
                    <span class="stat-val" id="total-count">-</span><span class="stat-label">名 エントリー済</span>
                </div>
            </div>

            <div class="list-container">
                <table>
                    <thead>
                        <tr>
                            <th>エントリー日時</th>
                            <th>所属</th>
                            <th>学年</th>
                            <th>エントリーネーム</th>
                            <th>意気込み</th>
                        </tr>
                    </thead>
                    <tbody id="list-body">
                        <tr><td colspan="4" style="text-align:center;color:#888;">読み込み中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="list-container disabled-msg" id="disabled-msg">
            <i class="fa-solid fa-lock"></i> 現在エントリーリストは非公開です。
        </div>
    </div>

    <script src="js/entry_list.js"></script>
</body>
</html>
