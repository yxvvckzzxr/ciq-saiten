<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src https://fonts.gstatic.com https://cdnjs.cloudflare.com; connect-src 'self' wss://quziopus-default-rtdb.asia-southeast1.firebasedatabase.app https://quziopus-default-rtdb.asia-southeast1.firebasedatabase.app https://firebasestorage.googleapis.com https://*.googleapis.com https://script.google.com https://www.gstatic.com; img-src 'self' data: blob: https://firebasestorage.googleapis.com;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="description" content="QuizOpus - クイズ大会の解答採点を支援するウェブプラットフォーム。リアルタイム採点・成績開示・参加者管理をワンストップで。">
    <meta property="og:title" content="QuizOpus - 解答採点プラットフォーム">
    <meta property="og:description" content="クイズ大会の解答採点を支援するウェブプラットフォーム">
    <meta property="og:type" content="website">
    <meta property="og:image" content="favicon.png">
    <title>QuizOpus - エントリーリスト</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="js/config.js"></script>
    <script src="js/shared.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/design_system.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body class="page-wrapper">
    <div class="page-container full">
        <div class="page-logo">
            <span class="logo-icon"><i class="fa-solid fa-clipboard-list"></i></span>
            <h1 id="page-title"><i class="fa-solid fa-spinner fa-spin"></i> 読み込み中...</h1>
            <div class="logo-sub" id="page-subtitle">エントリーリスト</div>
        </div>

        <div id="content-area" style="display:none">
            <div style="text-align:center">
                <div class="stat-badge glass-panel">
                    <span class="stat-val" id="total-count">-</span>
                    <span class="stat-label"><i class="fa-solid fa-user-check"></i> 名 エントリー済</span>
                </div>
            </div>

            <div class="list-container">
                <table>
                    <thead>
                        <tr>
                            <th><i class="fa-regular fa-calendar"></i> エントリー日時</th>
                            <th><i class="fa-solid fa-school"></i> 所属</th>
                            <th><i class="fa-solid fa-graduation-cap"></i> 学年</th>
                            <th><i class="fa-solid fa-id-badge"></i> エントリーネーム</th>
                            <th><i class="fa-solid fa-comment"></i> 意気込み</th>
                        </tr>
                    </thead>
                    <tbody id="list-body">
                        <tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:32px"><i class="fa-solid fa-spinner fa-spin"></i> 読み込み中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="page-card page-disabled" id="disabled-msg">
            <i class="fa-solid fa-lock"></i>
            現在エントリーリストは非公開です。
        </div>

        <div class="page-footer">Powered by QuizOpus</div>
    </div>

    <script src="js/entry_list.js"></script>
</body>
</html>
