<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIQ the 13th 採点システム - 答案設定</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: sans-serif;
            background: #1a1a2e;
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        .top-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        h1 {
            font-size: 20px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            background: #4caf50;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }

        .btn:hover {
            background: #388e3c;
        }

        .btn:disabled {
            background: #444;
            cursor: not-allowed;
        }

        .btn.secondary {
            background: #0f3460;
            border: 1px solid #444;
        }

        .btn.secondary:hover {
            background: #1a4a7a;
        }

        .section {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            max-width: 800px;
        }

        .section h2 {
            font-size: 15px;
            color: #aaa;
            margin-bottom: 12px;
        }

        .progress-bar-container {
            width: 100%;
            height: 8px;
            background: #333;
            border-radius: 4px;
            margin: 12px 0;
        }

        .progress-bar {
            height: 100%;
            background: #4caf50;
            border-radius: 4px;
            width: 0%;
            transition: width 0.3s;
        }

        .status-text {
            font-size: 13px;
            color: #aaa;
            margin-top: 8px;
        }

        .answer-list {
            margin-top: 16px;
            max-height: 300px;
            overflow-y: auto;
        }

        .answer-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px;
            border-bottom: 1px solid #333;
            font-size: 13px;
        }

        .answer-item img {
            width: 60px;
            height: 40px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid #444;
            background: white;
        }

        .badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
        }

        .badge.ok {
            background: #1b5e20;
        }

        .badge.error {
            background: #b71c1c;
        }

        .badge.warn {
            background: #e65100;
        }

        input[type="file"] {
            color: white;
            margin-right: 12px;
        }
    </style>
</head>

<body>
    <div class="top-bar">
        <button class="btn secondary" onclick="location.href='judge.html'">← 一覧へ</button>
        <h1>答案設定</h1>
    </div>

    <div class="section">
        <h2>STEP 1: 答案PDFをアップロード</h2>
        <input type="file" id="pdf-file" accept=".pdf" />
        <button class="btn" onclick="loadAnswers()">読み込み開始</button>
        <div class="progress-bar-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="status-text" id="status-text">PDFを選択して読み込み開始を押してください</div>
    </div>

    <div class="section" id="result-section" style="display:none">
        <h2>STEP 2: 読み込み結果確認</h2>
        <div class="status-text" id="result-summary"></div>
        <div class="answer-list" id="answer-list"></div>
        <br>
        <button class="btn" id="save-btn" onclick="saveToFirebase()" disabled>
            Firebaseに保存
        </button>
    </div>

    <canvas id="work-canvas" style="display:none"></canvas>
    <canvas id="transform-canvas" style="display:none"></canvas>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDk-RpKCX5Hd-xNnrso_x5fd3S-vUoWKUc",
            authDomain: "ciq-saiten.firebaseapp.com",
            databaseURL: "https://ciq-saiten-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ciq-saiten",
            storageBucket: "ciq-saiten.firebasestorage.app",
            messagingSenderId: "987606904586",
            appId: "1:987606904586:web:b16876b8963a55a60d94f3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const scorerRole = sessionStorage.getItem('scorer_role');
        if (scorerRole !== 'admin') location.href = 'judge.html';

        pdfjsLib.GlobalWorkerOptions.workerSrc =
            'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const workCanvas = document.getElementById('work-canvas');
        const workCtx = workCanvas.getContext('2d');
        const transformCanvas = document.getElementById('transform-canvas');
        const transformCtx = transformCanvas.getContext('2d');

        let config = null;
        let answers = [];

        async function loadAnswers() {
            const file = document.getElementById('pdf-file').files[0];
            if (!file) { alert('PDFを選択してください'); return; }

            const snap = await db.ref('config').get();
            if (!snap.exists()) {
                alert('座標設定が見つかりません');
                return;
            }
            config = snap.val();

            const arrayBuffer = await file.arrayBuffer();
            let pdfDoc;
            try {
                pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            } catch (e) {
                alert('PDFの読み込みに失敗しました: ' + e.message);
                return;
            }

            const total = pdfDoc.numPages;
            answers = [];
            document.getElementById('status-text').textContent = `0 / ${total} ページ処理中...`;
            document.getElementById('progress-bar').style.width = '0%';

            for (let pageNum = 1; pageNum <= total; pageNum++) {
                const page = await pdfDoc.getPage(pageNum);
                const viewport = page.getViewport({ scale: config.scale || 1.5 });
                workCanvas.width = viewport.width;
                workCanvas.height = viewport.height;
                await page.render({ canvasContext: workCtx, viewport }).promise;

                // トンボ検出 (矩形ベース)
                const detectedResult = detectTombo(config.tombo);

                // 完全な射影変換行列（ホモグラフィ）を計算し、歪みを正確に補正する
                const refCenterPoints = config.tombo.map(r => ({ x: r.x + r.w / 2, y: r.y + r.h / 2 }));
                const transform = calcPerspectiveTransform(refCenterPoints, detectedResult.points);

                // 受付番号読み取り（補正済み座標を使用）
                const correctedMarkCells = config.markCells.map(cell => transformRegion(cell, transform));
                const entryNumber = readEntryNumber(correctedMarkCells);

                // 100問の解答欄を切り出し（補正済み座標を使用）
                const cells = [];
                for (let q = 0; q < 100; q++) {
                    const correctedRegion = transformRegion(config.answerRegions[q], transform);
                    const imageData = cutRegion(correctedRegion);
                    cells.push({ q: q + 1, imageData });
                }

                answers.push({ page: pageNum, entryNumber, cells, tomboError: detectedResult.error });

                const pct = Math.round((pageNum / total) * 100);
                document.getElementById('progress-bar').style.width = pct + '%';
                document.getElementById('status-text').textContent = `${pageNum} / ${total} ページ処理中...`;
            }

            document.getElementById('status-text').textContent = `完了: ${total}ページ処理しました`;
            showResults();
        }

        function detectTombo(refTombo) {
            const detected = [];
            const margin = 20; // 探索範囲の余裕（px）
            let error = false;

            for (const ref of refTombo) {
                const refCX = ref.x + ref.w / 2;
                const refCY = ref.y + ref.h / 2;

                const x1 = Math.max(0, Math.floor(ref.x - margin));
                const y1 = Math.max(0, Math.floor(ref.y - margin));
                const x2 = Math.min(workCanvas.width, Math.ceil(ref.x + ref.w + margin));
                const y2 = Math.min(workCanvas.height, Math.ceil(ref.y + ref.h + margin));
                const w = x2 - x1;
                const h = y2 - y1;

                if (w <= 0 || h <= 0) {
                    detected.push({ x: refCX, y: refCY });
                    error = true;
                    continue;
                }

                const imageData = workCtx.getImageData(x1, y1, w, h);
                let sumX = 0, sumY = 0, count = 0;
                const threshold = 100; // 暗さの閾値

                for (let py = 0; py < h; py++) {
                    for (let px = 0; px < w; px++) {
                        const idx = (py * w + px) * 4;
                        const brightness = (imageData.data[idx] + imageData.data[idx + 1] + imageData.data[idx + 2]) / 3;
                        if (brightness < threshold) {
                            sumX += px;
                            sumY += py;
                            count++;
                        }
                    }
                }

                if (count > 10) {
                    detected.push({
                        x: x1 + sumX / count,
                        y: y1 + sumY / count
                    });
                } else {
                    // トンボが見つからない場合は設定値の中心を使用
                    detected.push({ x: refCX, y: refCY });
                    error = true;
                }
            }

            return { points: detected, error };
        }

        // 4点から射影変換（ホモグラフィ）行列を計算
        // 歪んだ画像（斜め撮り等）も正確に補正可能にする
        function calcPerspectiveTransform(src, dst) {
            if (src.length < 4 || dst.length < 4) {
                return null;
            }

            const A = [];
            const b = [];
            for (let i = 0; i < 4; i++) {
                const sx = src[i].x, sy = src[i].y;
                const dx = dst[i].x, dy = dst[i].y;
                A.push([sx, sy, 1, 0, 0, 0, -sx * dx, -sy * dx]);
                b.push(dx);
                A.push([0, 0, 0, sx, sy, 1, -sx * dy, -sy * dy]);
                b.push(dy);
            }

            const n = 8;
            const M = A.map((row, i) => [...row, b[i]]);
            
            for (let col = 0; col < n; col++) {
                let maxRow = col;
                for (let row = col + 1; row < n; row++) {
                    if (Math.abs(M[row][col]) > Math.abs(M[maxRow][col])) maxRow = row;
                }
                [M[col], M[maxRow]] = [M[maxRow], M[col]];
                if (M[col][col] === 0) return null;

                for (let row = col + 1; row < n; row++) {
                    const factor = M[row][col] / M[col][col];
                    for (let j = col; j <= n; j++) M[row][j] -= factor * M[col][j];
                }
            }

            const h = new Array(n).fill(0);
            for (let i = n - 1; i >= 0; i--) {
                h[i] = M[i][n] / M[i][i];
                for (let j = i - 1; j >= 0; j--) M[j][n] -= M[j][i] * h[i];
            }

            return {
                h00: h[0], h01: h[1], h02: h[2],
                h10: h[3], h11: h[4], h12: h[5],
                h20: h[6], h21: h[7]
            };
        }

        // 座標を射影変換で補正
        function transformPoint(x, y, t) {
            if (!t) return { x, y };
            const div = t.h20 * x + t.h21 * y + 1;
            return {
                x: (t.h00 * x + t.h01 * y + t.h02) / div,
                y: (t.h10 * x + t.h11 * y + t.h12) / div
            };
        }

        // 領域（矩形）をアフィン変換で補正
        function transformRegion(region, t) {
            const tl = transformPoint(region.x, region.y, t);
            const br = transformPoint(region.x + region.w, region.y + region.h, t);
            return {
                x: tl.x,
                y: tl.y,
                w: br.x - tl.x,
                h: br.y - tl.y,
                row: region.row,
                col: region.col
            };
        }

        function readEntryNumber(markCells) {
            const rows = [[], [], []];
            markCells.forEach(cell => {
                if (cell.row === undefined || cell.row === null) return;
                const darkness = getMeanDarkness(cell);
                rows[cell.row].push({ col: cell.col, darkness });
            });

            const digits = rows.map(row => {
                if (row.length === 0) return 0;
                const sorted = [...row].sort((a, b) => b.darkness - a.darkness);
                return sorted[0].col;
            });

            return digits[0] * 100 + digits[1] * 10 + digits[2];
        }

        function getMeanDarkness(region) {
            const x = Math.round(Math.max(0, region.x));
            const y = Math.round(Math.max(0, region.y));
            const w = Math.max(1, Math.round(Math.min(region.w, workCanvas.width - x)));
            const h = Math.max(1, Math.round(Math.min(region.h, workCanvas.height - y)));
            const imageData = workCtx.getImageData(x, y, w, h);
            let total = 0;
            for (let i = 0; i < imageData.data.length; i += 4) {
                const r = imageData.data[i];
                const g = imageData.data[i + 1];
                const b = imageData.data[i + 2];
                total += (255 - (r + g + b) / 3);
            }
            return total / (imageData.data.length / 4);
        }

        function cutRegion(r) {
            const x = Math.round(Math.max(0, r.x));
            const y = Math.round(Math.max(0, r.y));
            const w = Math.max(1, Math.round(Math.min(r.w, workCanvas.width - x)));
            const h = Math.max(1, Math.round(Math.min(r.h, workCanvas.height - y)));

            const offscreen = document.createElement('canvas');
            offscreen.width = w;
            offscreen.height = h;
            const offCtx = offscreen.getContext('2d');
            offCtx.drawImage(workCanvas, x, y, w, h, 0, 0, w, h);
            return offscreen.toDataURL('image/jpeg', 0.7);
        }

        function showResults() {
            document.getElementById('result-section').style.display = 'block';
            const list = document.getElementById('answer-list');
            list.innerHTML = '';

            let okCount = 0;
            let errorCount = 0;
            let warnCount = 0;

            answers.forEach(a => {
                const isValid = a.entryNumber >= 1 && a.entryNumber <= 999;
                if (isValid && !a.tomboError) okCount++;
                else if (!isValid) errorCount++;
                else warnCount++;

                const item = document.createElement('div');
                item.className = 'answer-item';
                item.innerHTML = `
          <img src="${a.cells[0]?.imageData}" alt="1問目" />
          <span>ページ ${a.page}</span>
          <span>受付番号: <strong>${a.entryNumber}</strong></span>
          ${a.tomboError ? '<span style="font-size:11px;color:#ff9800">トンボ検出失敗</span>' : ''}
          <span class="badge ${isValid ? (a.tomboError ? 'warn' : 'ok') : 'error'}">
            ${isValid ? 'OK' : 'エラー'}
          </span>
        `;
                list.appendChild(item);
            });

            document.getElementById('result-summary').textContent =
                `${okCount}件OK / ${warnCount}件警告 / ${errorCount}件エラー`;

            if (errorCount === 0) {
                document.getElementById('save-btn').disabled = false;
            }
        }

        async function saveToFirebase() {
            document.getElementById('save-btn').disabled = true;
            document.getElementById('status-text').textContent = 'Firebaseに保存中...';

            const batch = {};
            for (const a of answers) {
                batch[`answers/${a.entryNumber}`] = {
                    entryNumber: a.entryNumber,
                    page: a.page,
                    cells: a.cells.reduce((obj, c) => {
                        obj[`q${c.q}`] = c.imageData;
                        return obj;
                    }, {})
                };
            }

            await db.ref('/').update(batch);
            document.getElementById('status-text').textContent = '保存完了しました';
            document.getElementById('save-btn').disabled = false;
        }
    </script>
</body>

</html>
