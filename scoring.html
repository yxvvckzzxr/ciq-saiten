<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIQ the 13th 採点システム - 答案設定</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: sans-serif;
            background: #1a1a2e;
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        .top-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        h1 {
            font-size: 20px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            background: #4caf50;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }

        .btn:hover {
            background: #388e3c;
        }

        .btn:disabled {
            background: #444;
            cursor: not-allowed;
        }

        .btn.secondary {
            background: #0f3460;
            border: 1px solid #444;
        }

        .btn.secondary:hover {
            background: #1a4a7a;
        }

        .section {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            max-width: 800px;
        }

        .section h2 {
            font-size: 15px;
            color: #aaa;
            margin-bottom: 12px;
        }

        .progress-bar-container {
            width: 100%;
            height: 8px;
            background: #333;
            border-radius: 4px;
            margin: 12px 0;
        }

        .progress-bar {
            height: 100%;
            background: #4caf50;
            border-radius: 4px;
            width: 0%;
            transition: width 0.3s;
        }

        .status-text {
            font-size: 13px;
            color: #aaa;
            margin-top: 8px;
        }

        .answer-list {
            margin-top: 16px;
            max-height: 300px;
            overflow-y: auto;
        }

        .answer-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px;
            border-bottom: 1px solid #333;
            font-size: 13px;
        }

        .answer-item img {
            width: 60px;
            height: 40px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid #444;
            background: white;
        }

        .badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
        }

        .badge.ok {
            background: #1b5e20;
        }

        .badge.error {
            background: #b71c1c;
        }

        input[type="file"] {
            color: white;
            margin-right: 12px;
        }
    </style>
</head>

<body>
    <div class="top-bar">
        <button class="btn secondary" onclick="location.href='judge.html'">← 一覧へ</button>
        <h1>答案設定</h1>
    </div>

    <div class="section">
        <h2>STEP 1: 答案PDFをアップロード</h2>
        <input type="file" id="pdf-file" accept=".pdf" />
        <button class="btn" onclick="loadAnswers()">読み込み開始</button>
        <div class="progress-bar-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="status-text" id="status-text">PDFを選択して読み込み開始を押してください</div>
    </div>

    <div class="section" id="result-section" style="display:none">
        <h2>STEP 2: 読み込み結果確認</h2>
        <div class="status-text" id="result-summary"></div>
        <div class="answer-list" id="answer-list"></div>
        <br>
        <button class="btn" id="save-btn" onclick="saveToFirebase()" disabled>
            Firebaseに保存
        </button>
    </div>

    <canvas id="work-canvas" style="display:none"></canvas>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDk-RpKCX5Hd-xNnrso_x5fd3S-vUoWKUc",
            authDomain: "ciq-saiten.firebaseapp.com",
            databaseURL: "https://ciq-saiten-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ciq-saiten",
            storageBucket: "ciq-saiten.firebasestorage.app",
            messagingSenderId: "987606904586",
            appId: "1:987606904586:web:b16876b8963a55a60d94f3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const scorerRole = sessionStorage.getItem('scorer_role');
        if (scorerRole !== 'admin') {
            location.href = 'judge.html';
        }

        pdfjsLib.GlobalWorkerOptions.workerSrc =
            'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const workCanvas = document.getElementById('work-canvas');
        const workCtx = workCanvas.getContext('2d');

        let config = null;
        let answers = [];

        async function loadAnswers() {
            const file = document.getElementById('pdf-file').files[0];
            if (!file) { alert('PDFを選択してください'); return; }

            const snap = await db.ref('config').get();
            if (!snap.exists()) {
                alert('座標設定が見つかりません。座標設定ページで設定してください');
                return;
            }
            config = snap.val();

            const arrayBuffer = await file.arrayBuffer();
            let pdfDoc;
            try {
                pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            } catch (e) {
                alert('PDFの読み込みに失敗しました: ' + e.message);
                return;
            }

            const total = pdfDoc.numPages;
            answers = [];
            document.getElementById('status-text').textContent = `0 / ${total} ページ処理中...`;
            document.getElementById('progress-bar').style.width = '0%';

            for (let pageNum = 1; pageNum <= total; pageNum++) {
                const page = await pdfDoc.getPage(pageNum);
                const viewport = page.getViewport({ scale: config.scale || 1.5 });
                workCanvas.width = viewport.width;
                workCanvas.height = viewport.height;
                await page.render({ canvasContext: workCtx, viewport }).promise;

                const entryNumber = readEntryNumber(config.markCells);
                const cells = [];
                for (let q = 0; q < 100; q++) {
                    const r = config.answerRegions[q];
                    const imageData = cutRegion(r);
                    cells.push({ q: q + 1, imageData });
                }

                answers.push({ page: pageNum, entryNumber, cells });

                const pct = Math.round((pageNum / total) * 100);
                document.getElementById('progress-bar').style.width = pct + '%';
                document.getElementById('status-text').textContent = `${pageNum} / ${total} ページ処理中...`;
            }

            document.getElementById('status-text').textContent = `完了: ${total}ページ処理しました`;
            showResults();
        }

        function readEntryNumber(markCells) {
            const rows = [[], [], []];
            markCells.forEach(cell => {
                const darkness = getMeanDarkness(cell);
                rows[cell.row].push({ col: cell.col, darkness });
            });
            const digits = rows.map(row => {
                const sorted = [...row].sort((a, b) => b.darkness - a.darkness);
                return sorted[0].col;
            });
            return digits[0] * 100 + digits[1] * 10 + digits[2];
        }

        function getMeanDarkness(region) {
            const imageData = workCtx.getImageData(
                Math.round(region.x), Math.round(region.y),
                Math.max(1, Math.round(region.w)), Math.max(1, Math.round(region.h))
            );
            let total = 0;
            for (let i = 0; i < imageData.data.length; i += 4) {
                const r = imageData.data[i];
                const g = imageData.data[i + 1];
                const b = imageData.data[i + 2];
                total += (255 - (r + g + b) / 3);
            }
            return total / (imageData.data.length / 4);
        }

        function cutRegion(r) {
            const offscreen = document.createElement('canvas');
            offscreen.width = Math.max(1, Math.round(r.w));
            offscreen.height = Math.max(1, Math.round(r.h));
            const offCtx = offscreen.getContext('2d');
            offCtx.drawImage(
                workCanvas,
                Math.round(r.x), Math.round(r.y),
                Math.round(r.w), Math.round(r.h),
                0, 0,
                offscreen.width, offscreen.height
            );
            return offscreen.toDataURL('image/jpeg', 0.7);
        }

        function showResults() {
            document.getElementById('result-section').style.display = 'block';
            const list = document.getElementById('answer-list');
            list.innerHTML = '';

            let okCount = 0;
            let errorCount = 0;

            answers.forEach(a => {
                const isValid = a.entryNumber >= 1 && a.entryNumber <= 999;
                if (isValid) okCount++; else errorCount++;

                const item = document.createElement('div');
                item.className = 'answer-item';
                item.innerHTML = `
          <img src="${a.cells[0]?.imageData}" alt="1問目" />
          <span>ページ ${a.page}</span>
          <span>受付番号: <strong>${a.entryNumber}</strong></span>
          <span class="badge ${isValid ? 'ok' : 'error'}">${isValid ? 'OK' : 'エラー'}</span>
        `;
                list.appendChild(item);
            });

            document.getElementById('result-summary').textContent =
                `${okCount}件OK / ${errorCount}件エラー`;

            if (errorCount === 0) {
                document.getElementById('save-btn').disabled = false;
            }
        }

        async function saveToFirebase() {
            document.getElementById('save-btn').disabled = true;
            document.getElementById('status-text').textContent = 'Firebaseに保存中...';

            const batch = {};
            for (const a of answers) {
                batch[`answers/${a.entryNumber}`] = {
                    entryNumber: a.entryNumber,
                    page: a.page,
                    cells: a.cells.reduce((obj, c) => {
                        obj[`q${c.q}`] = c.imageData;
                        return obj;
                    }, {})
                };
            }

            await db.ref('/').update(batch);
            document.getElementById('status-text').textContent = '保存完了しました';
            document.getElementById('save-btn').disabled = false;
        }
    </script>
</body>

</html>
