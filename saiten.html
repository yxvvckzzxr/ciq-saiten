  <title>解答採点プラットフォーム - プロジェクト設定</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #1a1a2e; color: white; min-height: 100vh; padding: 20px; }
    .top-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    h1 { font-size: 20px; }
    .btn { padding: 8px 16px; border-radius: 8px; border: none; background: #4caf50; color: white; font-size: 14px; cursor: pointer; white-space: nowrap; }
    .btn:hover { background: #388e3c; }
    .btn.secondary { background: #0f3460; border: 1px solid #444; }
    .btn.secondary:hover { background: #1a4a7a; }
    .main { display: flex; gap: 20px; flex-wrap: wrap; }
    .card { background: #16213e; border-radius: 12px; padding: 24px; min-width: 400px; flex: 1; }
    label { font-size: 14px; color: #aaa; display: block; margin-bottom: 8px; margin-top: 16px; }
    input { width: 100%; padding: 12px 16px; border-radius: 8px; border: 1px solid #444; background: #0f3460; color: white; font-size: 16px; }
    .status { padding: 12px; border-radius: 8px; background: #1b5e20; color: white; font-size: 14px; text-align: center; margin-top: 16px; display: none; }
  </style>
</head>
<body>
  <div class="top-bar">
    <button class="btn secondary" onclick="location.href='judge.html'">← 採点画面へ</button>
    <h1>プロジェクト設定・解答用紙ジェネレーター</h1>
    <div style="margin-left: auto; background: #0f3460; padding: 6px 12px; border-radius: 8px; font-size: 14px; border: 1px solid #444;" id="project-id-display"></div>
  </div>

  <div class="main">
    <div class="card">
      <h2 style="margin-bottom: 8px;">GAS（スプレッドシート）連携設定</h2>
      <p style="color: #aaa; font-size: 14px; margin-bottom: 24px;">参加者名簿との同期やCSVバックアップに使用するURLを設定します。</p>
      
      <label>GAS 連携URL</label>
      <input type="text" id="gas-url" placeholder="https://script.google.com/macros/s/..." />
      <button class="btn" style="width: 100%; margin-top: 24px; padding: 12px; font-weight: bold;" onclick="saveGas()">GAS設定を保存</button>
      
      <div id="gas-status" class="status">✅ GAS設定を保存しました！</div>
    </div>
    
    <div class="card">
      <h2 style="margin-bottom: 8px;">解答用紙ジェネレーター</h2>
      <p style="color: #aaa; font-size: 14px; margin-bottom: 24px;">システム専用の解答用紙(PDF)をここから自動生成します。</p>

      <label>問題数 (デフォルト: 100)</label>
      <input type="number" id="question-count" value="100" min="10" max="200" />
      
      <label>段の列数 (デフォルト: 5)</label>
      <input type="number" id="question-cols" value="5" min="2" max="10" />
      <div style="font-size: 12px; color: #888; margin-top: 4px;">例：100問で5列の場合、20段の表が描画されます。</div>
      
      <button class="btn" style="width: 100%; margin-top: 32px; padding: 16px; font-weight: bold;" onclick="generateAndSave()">解答用紙PDFの発行 と 座標データ保存</button>
      
      <div id="save-status" class="status">✅ PDFが生成され、座標データが保存されました！</div>
    </div>
  </div>

    }

    async function generateAndSave() {
      try {
        const qCount = parseInt(document.getElementById('question-count').value);
        const qCols = parseInt(document.getElementById('question-cols').value);

        if (qCount < 1 || qCols < 1) {
          alert("正しい数値を入力してください");
          return;
        }

        // PDFジェネレータの初期化 (A4, mm単位)
        window.jsPDF = window.jspdf.jsPDF;
        const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
        const pageWidth = 210;
        const pageHeight = 297;

        // 共通マージンと座標空間の定義 (1mm = 1次元単位としてシステムに保存)
        const config = {
          questionCount: qCount,
          columns: qCols,
          scale: 1, // ミリメートル空間のスケール（読取時にどう拡大縮小されても射影変換で吸収できる）
          tombo: [],
          markCells: [],
          answerRegions: []
        };

        // 1. ARマーカー (10mm x 10mm), 各角から5mm
        const markerSize = 10;
        const margin = 5;
        const tomboCoords = [
          { x: margin, y: margin, id: 0 },
          { x: pageWidth - margin - markerSize, y: margin, id: 1 },
          { x: margin, y: pageHeight - margin - markerSize, id: 2 },
          { x: pageWidth - margin - markerSize, y: pageHeight - margin - markerSize, id: 3 }
        ];

        tomboCoords.forEach((p, index) => {
          doc.addImage(marker_b64[p.id], 'PNG', p.x, p.y, markerSize, markerSize);
          config.tombo.push({ x: p.x, y: p.y, w: markerSize, h: markerSize });
        });

        // フォントの読み込み (日本語対応)
        const fontRes = await fetch("fonts/BIZUDGothic-Regular.ttf");
        const fontBuffer = await fontRes.arrayBuffer();
        let binary = '';
        const bytes = new Uint8Array(fontBuffer);
        for (let i = 0; i < bytes.byteLength; i++) {
            binary += String.fromCharCode(bytes[i]);
        }
        const fontBase64 = window.btoa(binary);
        doc.addFileToVFS('BIZUDGothic.ttf', fontBase64);
        doc.addFont('BIZUDGothic.ttf', 'BIZUDGothic', 'normal');
        doc.setFont('BIZUDGothic');
        doc.setFontSize(8);
        doc.setTextColor(50);


        // 2. 解答欄 (Questions Grid)
        // プレイアブルエリア：横方向はマーカー間+α、縦方向は上のマーカー下から下のマーカー上までの間
        const gridMarginX = 15;
        const gridMarginTop = 20;
        const gridSpaceWidth = pageWidth - gridMarginX * 2;
        const colWidth = gridSpaceWidth / qCols;
        
        const rows = Math.ceil(qCount / qCols);
        // グリッドの高さを確保 (全高297 - 上20 - 下(マークシート分)35 = 242)
        const maxGridHeight = 240;
        const rowHeight = maxGridHeight / rows;

        doc.setLineWidth(0.2);
        
        for (let i = 0; i < qCount; i++) {
          const row = Math.floor(i / qCols);
        const col = i % qCols;
          const x = gridMarginX + col * colWidth;
          const y = gridMarginTop + row * rowHeight;

          // 問題番号の枠線と印字
          doc.rect(x, y, colWidth, rowHeight, 'S');
          doc.text((i + 1).toString(), x + 2, y + 4);

          // システムが読み取る解答枠 (x + 8 から右端まで)
          const ansX = x + 8;
          const ansW = colWidth - 8;
          config.answerRegions.push({ x: ansX, y, w: ansW, h: rowHeight });

          // もし見た目上の枠線も引きたい場合はここに記述(今回は不要)
        }

        // 縦書きテキスト描画用ヘルパー関数
        function drawVerticalText(doc, str, x, centerY) {
            const chars = str.split('');
            const spacing = 3.5;
            const startY = centerY - ((chars.length - 1) * spacing) / 2;
            chars.forEach((c, i) => {
                doc.text(c, x, startY + i * spacing, { align: 'center', baseline: 'middle' });
            });
        }

        // 3. 統合下部ボックス枠 (Bottom full-width box)
        // 上のグリッドが maxGridHeight = 255 まで拡張されたため、開始位置を下げる
        const boxX = 15;
        const boxY = gridMarginTop + maxGridHeight + 5; // 5+255+5 = 265
        const boxW = 180;
        const boxH = 26;
        
        doc.rect(boxX, boxY, boxW, boxH, 'S');

        // 各種区切り線 (横幅と用途)
        const L1 = boxX + 6;   // 受付番号ラベル (6mm幅)
        const L2 = boxX + 13;  // 手書き枠 (7mm幅)
        const L3 = boxX + 57;  // マークシート枠 (44mm幅)
        const L4 = L3 + 6;     // 学年ラベル (6mm幅)
        const L5 = L4 + 18;    // 学年枠 (18mm幅)
        const L6 = L5 + 6;     // 所属ラベル (6mm幅)
        const L7 = L6 + 40;    // 所属枠 (40mm幅)
        const L8 = L7 + 6;     // 氏名ラベル (6mm幅) ...残り氏名枠(62mm幅)
        
        [L1, L2, L3, L4, L5, L6, L7, L8].forEach(lx => {
            doc.line(lx, boxY, lx, boxY + boxH, 'S');
        });

        const rowH = boxH / 3;
        // マーカーシート部分の横線 (3桁の分離)
        doc.line(L1, boxY + rowH, L3, boxY + rowH, 'S');
        doc.line(L1, boxY + rowH*2, L3, boxY + rowH*2, 'S');

        // ラベル描画 (すべて縦書き・中央揃え)
        doc.setFontSize(8);
        drawVerticalText(doc, "受付番号", boxX + 3, boxY + boxH/2);
        drawVerticalText(doc, "学年", L3 + 3, boxY + boxH/2);
        drawVerticalText(doc, "所属", L5 + 3, boxY + boxH/2);
        drawVerticalText(doc, "氏名", L7 + 3, boxY + boxH/2);

        // マークシートのバブル配置
        const bubbleW = 3.2;
        const bubbleH = 5.0;
        
        for (let row = 0; row < 3; row++) {
          const cy = boxY + row * rowH + rowH / 2;
          for (let col = 0; col < 10; col++) {
            const cx = L2 + 2.5 + col * 4.2;
            doc.ellipse(cx + bubbleW/2, cy, bubbleW/2, bubbleH/2, 'S');
            doc.text(col.toString(), cx + bubbleW/2, cy, { align: 'center', baseline: 'middle' });
            
            // scoring.html は cell.row を 桁数(0-2)、cell.col を 値(0-9) とみなす
            config.markCells.push({ x: cx, y: cy-bubbleH/2, w: bubbleW, h: bubbleH, row: row, col: col });
          }
        }




        // PDFのダウンロード
        doc.save(`answer_sheet_${qCount}q.pdf`);

        // Firebaseへの保存
        await db.ref(`projects/${pid}/config`).set(config);

        const statusEl = document.getElementById('save-status');
        statusEl.innerHTML = '✅ PDFが生成され、座標データが保存されました！';
        statusEl.style.background = '#1b5e20';
        statusEl.style.display = 'block';
        setTimeout(() => statusEl.style.display = 'none', 5000);
      } catch (err) {
        console.error(err);
        const statusEl = document.getElementById('save-status');
        statusEl.innerHTML = '❌ エラーが発生しました: ' + err.message;
        statusEl.style.background = '#b71c1c';
        statusEl.style.display = 'block';
      }
    }
  </script>
</body>
</html>
