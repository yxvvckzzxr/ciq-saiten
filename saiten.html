<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CIQ the 13th 採点システム</title>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: sans-serif;
      background: #1a1a2e;
      color: white;
      min-height: 100vh;
      padding: 20px;
    }

    h1 {
      font-size: 20px;
      margin-bottom: 16px;
    }

    .top-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      background: #4caf50;
      color: white;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn:hover {
      background: #388e3c;
    }

    .btn.secondary {
      background: #0f3460;
      border: 1px solid #444;
    }

    .btn.secondary:hover {
      background: #1a4a7a;
    }

    .btn.danger {
      background: #b71c1c;
    }

    .btn.danger:hover {
      background: #7f0000;
    }

    .main {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    .canvas-container {
      position: relative;
      flex: 1;
      overflow: auto;
    }

    #pdf-canvas {
      display: block;
      cursor: crosshair;
    }

    #overlay {
      position: absolute;
      top: 0;
      left: 0;
    }

    .sidebar {
      width: 280px;
      flex-shrink: 0;
    }

    .sidebar-section {
      background: #16213e;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .sidebar-section h3 {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 12px;
    }

    .mode-btn {
      display: block;
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 2px solid #444;
      background: transparent;
      color: #aaa;
      font-size: 13px;
      cursor: pointer;
      margin-bottom: 8px;
      text-align: left;
    }

    .mode-btn.active {
      border-color: #4caf50;
      color: white;
      background: #1b5e20;
    }

    .status {
      font-size: 13px;
      color: #aaa;
      margin-top: 8px;
    }

    .status span {
      color: #4caf50;
    }

    .progress-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 4px;
      margin-top: 8px;
    }

    .progress-cell {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 4px;
      background: #444;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      color: #aaa;
    }

    .progress-cell.done {
      background: #1b5e20;
      color: white;
    }
  </style>
</head>

<body>
  <h1>CIQ the 13th 採点システム - 座標設定</h1>

  <div class="top-bar">
    <input type="file" id="pdf-file" accept=".pdf" style="color:white;" />
    <button class="btn" onclick="loadPDF()">PDFを読み込む</button>
    <button class="btn secondary" onclick="prevPage()">◀</button>
    <span id="page-info">- / -</span>
    <button class="btn secondary" onclick="nextPage()">▶</button>
  </div>

  <div class="main">
    <div class="canvas-container">
      <canvas id="pdf-canvas"></canvas>
      <canvas id="overlay"></canvas>
    </div>

    <div class="sidebar">
      <div class="sidebar-section">
        <h3>設定モード</h3>
        <button class="mode-btn active" id="mode-tombo" onclick="setMode('tombo')">
          📍 トンボ設定（4箇所ドラッグ）
        </button>
        <button class="mode-btn" id="mode-mark" onclick="setMode('mark')">
          🔢 受付番号マーク設定（1回ドラッグ）
        </button>
        <button class="mode-btn" id="mode-answer" onclick="setMode('answer')">
          ✏️ 解答欄設定（100問）
        </button>
        <button class="mode-btn" id="mode-grid" onclick="setMode('grid')">
          🔲 グリッド自動設定
        </button>
        <div class="status" id="mode-status">トンボを4箇所ドラッグで囲んでください</div>
      </div>

      <div class="sidebar-section">
        <h3>トンボ</h3>
        <div class="status" id="tombo-status">未設定</div>
      </div>

      <div class="sidebar-section">
        <h3>受付番号マーク</h3>
        <div class="status" id="mark-status">未設定</div>
      </div>

      <div class="sidebar-section">
        <h3>解答欄進捗</h3>
        <div class="status" id="answer-count">0 / 100</div>
        <div class="progress-grid" id="progress-grid"></div>
      </div>

      <div class="sidebar-section">
        <button class="btn" style="width:100%;margin-bottom:8px" onclick="saveConfig()">
          設定を保存
        </button>
        <button class="btn danger" style="width:100%" onclick="resetConfig()">
          リセット
        </button>
      </div>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDk-RpKCX5Hd-xNnrso_x5fd3S-vUoWKUc",
      authDomain: "ciq-saiten.firebaseapp.com",
      databaseURL: "https://ciq-saiten-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "ciq-saiten",
      storageBucket: "ciq-saiten.firebasestorage.app",
      messagingSenderId: "987606904586",
      appId: "1:987606904586:web:b16876b8963a55a60d94f3"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    let pdfDoc = null;
    let currentPage = 1;
    let scale = 1.5;
    let mode = 'tombo';
    let tomboRegions = [];
    let markRegion = null;   // 1つの矩形→3×10に自動分割
    let markCells = [];      // 分割後の30マス
    let answerRegions = [];
    let dragStart = null;
    let dragCurrent = null;
    let gridPoints = [];

    const canvas = document.getElementById('pdf-canvas');
    const overlay = document.getElementById('overlay');
    const ctx = canvas.getContext('2d');
    const octx = overlay.getContext('2d');

    // プログレスグリッド初期化
    const grid = document.getElementById('progress-grid');
    for (let i = 1; i <= 100; i++) {
      const cell = document.createElement('div');
      cell.className = 'progress-cell';
      cell.id = `cell-${i}`;
      cell.textContent = i;
      grid.appendChild(cell);
    }

    async function loadPDF() {
      const file = document.getElementById('pdf-file').files[0];
      if (!file) return;
      const arrayBuffer = await file.arrayBuffer();
      try {
        pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        document.getElementById('page-info').textContent = `1 / ${pdfDoc.numPages}`;
        currentPage = 1;
        await renderPage(currentPage);
      } catch (e) {
        alert('PDFの読み込みに失敗しました: ' + e.message);
      }
    }

    async function renderPage(num) {
      const page = await pdfDoc.getPage(num);
      const viewport = page.getViewport({ scale });
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      overlay.width = viewport.width;
      overlay.height = viewport.height;
      overlay.style.position = 'absolute';
      overlay.style.top = '0';
      overlay.style.left = '0';
      await page.render({ canvasContext: ctx, viewport }).promise;
      drawOverlay();
    }

    function buildMarkCells(r) {
      const cells = [];
      const cellW = r.w / 10;
      const cellH = r.h / 3;
      for (let row = 0; row < 3; row++) {
        for (let col = 0; col < 10; col++) {
          cells.push({
            x: r.x + col * cellW,
            y: r.y + row * cellH,
            w: cellW,
            h: cellH,
            row,  // 0=100の位, 1=10の位, 2=1の位
            col   // 0〜9
          });
        }
      }
      return cells;
    }

    function drawOverlay() {
      octx.clearRect(0, 0, overlay.width, overlay.height);

      // トンボ
      tomboRegions.forEach((r, i) => {
        octx.strokeStyle = '#ff5722';
        octx.lineWidth = 2;
        octx.strokeRect(r.x, r.y, r.w, r.h);
        octx.fillStyle = 'rgba(255,87,34,0.2)';
        octx.fillRect(r.x, r.y, r.w, r.h);
        octx.fillStyle = 'white';
        octx.font = '11px sans-serif';
        octx.fillText(i + 1, r.x + 2, r.y + 12);
      });

      // マーク領域（3×10分割表示）
      if (markCells.length > 0) {
        const rowLabels = ['100', '10', '1'];
        markCells.forEach(c => {
          octx.strokeStyle = '#2196f3';
          octx.lineWidth = 1;
          octx.strokeRect(c.x, c.y, c.w, c.h);
          octx.fillStyle = 'rgba(33,150,243,0.15)';
          octx.fillRect(c.x, c.y, c.w, c.h);
        });
        // 行ラベル
        const rowLabelsArr = ['100の位', '10の位', '1の位'];
        for (let row = 0; row < 3; row++) {
          const firstCell = markCells[row * 10];
          octx.fillStyle = '#2196f3';
          octx.font = '10px sans-serif';
          octx.fillText(rowLabelsArr[row], firstCell.x, firstCell.y - 2);
        }
        // 列ラベル（0〜9）
        for (let col = 0; col < 10; col++) {
          const firstCell = markCells[col];
          octx.fillStyle = '#aaa';
          octx.font = '9px sans-serif';
          octx.fillText(col, firstCell.x + firstCell.w / 2 - 3, firstCell.y + firstCell.h - 2);
        }
      }

      // 解答欄
      answerRegions.forEach((r, i) => {
        octx.strokeStyle = '#4caf50';
        octx.lineWidth = 2;
        octx.strokeRect(r.x, r.y, r.w, r.h);
        octx.fillStyle = 'rgba(76,175,80,0.2)';
        octx.fillRect(r.x, r.y, r.w, r.h);
        octx.fillStyle = 'white';
        octx.font = '11px sans-serif';
        octx.fillText(i + 1, r.x + 2, r.y + 12);
      });

      // グリッド設定中のクリック点
      gridPoints.forEach((p, i) => {
        octx.fillStyle = '#ff9800';
        octx.beginPath();
        octx.arc(p.x, p.y, 8, 0, Math.PI * 2);
        octx.fill();
        octx.fillStyle = 'white';
        octx.font = '10px sans-serif';
        octx.fillText(i === 0 ? '1' : '100', p.x - 3, p.y + 4);
      });

      // ドラッグ中
      if (dragStart && dragCurrent) {
        const x = Math.min(dragStart.x, dragCurrent.x);
        const y = Math.min(dragStart.y, dragCurrent.y);
        const w = Math.abs(dragCurrent.x - dragStart.x);
        const h = Math.abs(dragCurrent.y - dragStart.y);
        octx.strokeStyle = mode === 'mark' ? '#2196f3' : '#4caf50';
        octx.lineWidth = 2;
        octx.setLineDash([4, 4]);
        octx.strokeRect(x, y, w, h);
        octx.setLineDash([]);
      }
    }

    overlay.addEventListener('mousedown', e => {
      const pos = getPos(e);
      if (mode === 'grid') {
        gridPoints.push(pos);
        drawOverlay();
        if (gridPoints.length === 2) {
          autoFillGrid(gridPoints[0], gridPoints[1]);
          gridPoints = [];
        }
      } else {
        dragStart = pos;
        dragCurrent = pos;
      }
    });

    overlay.addEventListener('mousemove', e => {
      if (dragStart) {
        dragCurrent = getPos(e);
        drawOverlay();
      }
    });

    overlay.addEventListener('mouseup', e => {
      if (dragStart) {
        const pos = getPos(e);
        const x = Math.min(dragStart.x, pos.x);
        const y = Math.min(dragStart.y, pos.y);
        const w = Math.abs(pos.x - dragStart.x);
        const h = Math.abs(pos.y - dragStart.y);
        if (w > 5 && h > 5) {
          if (mode === 'mark') {
            markRegion = { x, y, w, h };
            markCells = buildMarkCells(markRegion);
            document.getElementById('mark-status').innerHTML =
              `<span>設定済み</span>（3行×10列に自動分割）`;
          } else if (mode === 'answer') {
            if (answerRegions.length < 100) {
              answerRegions.push({ x, y, w, h });
              updateAnswerCount();
            }
          } else if (mode === 'tombo') {
            if (tomboRegions.length < 4) {
              tomboRegions.push({ x, y, w, h });
              updateTomboStatus();
            }
          }
        }
        dragStart = null;
        dragCurrent = null;
        drawOverlay();
      }
    });

    function getPos(e) {
      const rect = overlay.getBoundingClientRect();
      return {
        x: e.clientX - rect.left,
        y: e.clientY - rect.top
      };
    }

    function setMode(m) {
      mode = m;
      gridPoints = [];
      ['tombo', 'mark', 'answer', 'grid'].forEach(name => {
        document.getElementById(`mode-${name}`).classList.toggle('active', name === m);
      });
      const msgs = {
        tombo: 'トンボを4箇所ドラッグで囲んでください（左上→右上→左下→右下）',
        mark: '受付番号マーク欄全体を1回ドラッグで囲んでください（3行×10列に自動分割）',
        answer: '解答欄を1問ずつドラッグで囲んでください（1番から順に）',
        grid: '1番の左上角をクリック→100番の右下角をクリックしてください'
      };
      document.getElementById('mode-status').textContent = msgs[m];
    }

    function autoFillGrid(topLeft, bottomRight) {
      answerRegions = [];
      const cols = 5;
      const rows = 20;
      const totalW = bottomRight.x - topLeft.x;
      const totalH = bottomRight.y - topLeft.y;
      const cellW = totalW / cols;
      const cellH = totalH / rows;
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          answerRegions.push({
            x: topLeft.x + c * cellW,
            y: topLeft.y + r * cellH,
            w: cellW,
            h: cellH
          });
        }
      }
      updateAnswerCount();
      drawOverlay();
      alert('100問の解答欄を自動設定しました。');
    }

    function updateTomboStatus() {
      const labels = ['左上', '右上', '左下', '右下'];
      const set = tomboRegions.map((_, i) => labels[i]).join('・');
      const remaining = labels.slice(tomboRegions.length).join('・');
      document.getElementById('tombo-status').innerHTML =
        `設定済み: <span>${set || 'なし'}</span><br>残り: ${remaining || 'なし'}`;
    }

    function updateAnswerCount() {
      const count = answerRegions.length;
      document.getElementById('answer-count').textContent = `${count} / 100`;
      for (let i = 1; i <= 100; i++) {
        document.getElementById(`cell-${i}`).classList.toggle('done', i <= count);
      }
    }

    async function saveConfig() {
      if (tomboRegions.length !== 4) {
        alert('トンボを4箇所設定してください');
        return;
      }
      if (!markRegion) {
        alert('受付番号マーク欄を設定してください');
        return;
      }
      if (answerRegions.length !== 100) {
        alert(`解答欄が${answerRegions.length}問しか設定されていません`);
        return;
      }
      const config = {
        tombo: tomboRegions,
        markRegion,
        markCells,
        answerRegions,
        scale,
        savedAt: Date.now()
      };
      await db.ref('config').set(config);
      alert('設定を保存しました');
    }

    function resetConfig() {
      if (!confirm('設定をリセットしますか？')) return;
      tomboRegions = [];
      markRegion = null;
      markCells = [];
      answerRegions = [];
      gridPoints = [];
      updateTomboStatus();
      updateAnswerCount();
      document.getElementById('mark-status').textContent = '未設定';
      drawOverlay();
    }

    async function prevPage() {
      if (!pdfDoc || currentPage <= 1) return;
      currentPage--;
      document.getElementById('page-info').textContent = `${currentPage} / ${pdfDoc.numPages}`;
      await renderPage(currentPage);
    }

    async function nextPage() {
      if (!pdfDoc || currentPage >= pdfDoc.numPages) return;
      currentPage++;
      document.getElementById('page-info').textContent = `${currentPage} / ${pdfDoc.numPages}`;
      await renderPage(currentPage);
    }
  </script>
</body>

</html>
