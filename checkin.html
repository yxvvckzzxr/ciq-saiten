<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://*.firebasedatabase.app https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://unpkg.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src https://fonts.gstatic.com https://cdnjs.cloudflare.com; connect-src 'self' wss://*.firebasedatabase.app https://*.firebasedatabase.app https://*.googleapis.com https://www.gstatic.com; frame-src 'self' https://*.firebasedatabase.app https://*.firebaseapp.com; img-src 'self' data: blob:;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="description" content="CIQ - クイズ大会の解答採点を支援するウェブプラットフォーム">
    <meta property="og:title" content="CIQ - 解答採点プラットフォーム">
    <meta property="og:description" content="クイズ大会の解答採点を支援するウェブプラットフォーム">
    <meta property="og:type" content="website">
    <meta property="og:image" content="og-image.png">
    <title>CIQ - 当日受付</title>
    <script defer src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script defer src="js/config.js"></script>
    <script defer src="js/crypto.js"></script>
    <script defer src="js/shared.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" media="print" onload="this.media='all'">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=Noto+Sans+JP:wght@400;500;600;800&display=swap">
    <link rel="stylesheet" href="css/design_system.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body>
    <div class="fixed-header">
        <div class="header-left">
            <button class="back-nav-btn" onclick="location.href='judge.html'"><i class="fa-solid fa-chevron-left"></i> 戻る</button>
        </div>
        <div class="header-center">
            <h1 id="page-title"><i class="fa-solid fa-qrcode"></i> 当日受付</h1>
        </div>
        <div class="header-right"></div>
    </div>

    <div class="main-content">
        <div class="left-col">
            <div id="camera-container">
                <video id="video" autoplay playsinline></video>
                <canvas id="canvas"></canvas>
            </div>
            <p id="scanning-text"><i class="fa-solid fa-camera"></i> QRコードをカメラにかざしてください</p>
            <div id="result"></div>
        </div>

        <div class="right-col">
            <div class="stats-bar glass-panel" id="stats-bar" style="display:none;margin-top:0;">
                <h3><i class="fa-solid fa-chart-bar"></i> 受付状況</h3>
                <div class="stats-row" style="flex-wrap:wrap;">
                    <div class="stat-item glass-panel">
                        <div class="stat-num" id="stat-total" style="color: var(--primary)">-</div>
                        <div class="stat-label"><i class="fa-solid fa-users"></i> エントリー</div>
                    </div>
                    <div class="stat-item glass-panel">
                        <div class="stat-num" id="stat-checked" style="color: #34d399">-</div>
                        <div class="stat-label"><i class="fa-solid fa-check"></i> 受付済み</div>
                    </div>
                    <div class="stat-item glass-panel">
                        <div class="stat-num" id="stat-remaining" style="color: #fbbf24">-</div>
                        <div class="stat-label"><i class="fa-solid fa-clock"></i> 未受付</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script defer src="js/checkin.js"></script>
</body>
</html>
