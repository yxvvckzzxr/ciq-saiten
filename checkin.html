<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizOpus</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="js/config.js"></script>
  <script src="js/crypto.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        .top-bar {
            width: 100%; max-width: 500px;
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 16px;
        }
        h1 { font-size: 22px; flex: 1; }
        .btn {
            padding: 8px 16px; border-radius: 8px; border: none;
            color: white; font-size: 14px; cursor: pointer;
        }
        .btn.secondary { background: #0f3460; border: 1px solid #444; }
        .btn.secondary:hover { background: #1a4a7a; }

        #camera-container { position: relative; width: 100%; max-width: 500px; }
        #video { width: 100%; border-radius: 12px; border: 3px solid #444; background: #000; }
        #canvas { display: none; }

        #result {
            margin-top: 16px; width: 100%; max-width: 500px;
            padding: 20px; border-radius: 12px;
            text-align: center; font-size: 20px; display: none;
        }
        #result.success { background: #1b5e20; border: 2px solid #4caf50; }
        #result.error { background: #b71c1c; border: 2px solid #ef5350; }
        #result.already { background: #e65100; border: 2px solid #ff9800; }
        #result.canceled { background: #b71c1c; border: 2px solid #ef5350; }
        #result.loading { background: #1a237e; border: 2px solid #3f51b5; }
        .name { font-size: 28px; font-weight: bold; margin: 10px 0; }
        .number { font-size: 18px; color: #aaa; }

        #scanning-text { margin-top: 12px; color: #aaa; font-size: 14px; }

        .stats-bar {
            margin-top: 20px; padding: 16px; background: #16213e;
            border-radius: 12px; width: 100%; max-width: 500px;
        }
        .stats-bar h3 { font-size: 14px; color: #aaa; margin-bottom: 8px; }
        .stats-row { display: flex; justify-content: space-around; }
        .stat-item { text-align: center; }
        .stat-num { font-size: 28px; font-weight: bold; }
        .stat-label { font-size: 12px; color: #aaa; }
    </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/design_system.css">
</head>
<body>
    <div class="top-bar">
        <button class="btn secondary" onclick="location.href='judge.html'">← 戻る</button>
        <h1 id="page-title">当日受付</h1>
    </div>

    <div id="camera-container">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
    </div>
    <p id="scanning-text">QRコードをカメラにかざしてください</p>
    <div id="result"></div>

    <div class="stats-bar" id="stats-bar" style="display:none;">
        <h3>受付状況</h3>
        <div class="stats-row">
            <div class="stat-item">
                <div class="stat-num" id="stat-total">-</div>
                <div class="stat-label">エントリー数</div>
            </div>
            <div class="stat-item">
                <div class="stat-num" id="stat-checked" style="color:#4caf50">-</div>
                <div class="stat-label">受付済み</div>
            </div>
            <div class="stat-item">
                <div class="stat-num" id="stat-remaining" style="color:#ff9800">-</div>
                <div class="stat-label">未受付</div>
            </div>
        </div>
    </div>

    <script src="js/checkin.js"></script>
</body>
</html>
