<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src https://fonts.gstatic.com https://cdnjs.cloudflare.com; connect-src 'self' wss://quziopus-default-rtdb.asia-southeast1.firebasedatabase.app https://quziopus-default-rtdb.asia-southeast1.firebasedatabase.app https://firebasestorage.googleapis.com https://*.googleapis.com https://script.google.com https://www.gstatic.com; img-src 'self' data: blob: https://firebasestorage.googleapis.com;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="description" content="QuizOpus - クイズ大会の解答採点を支援するウェブプラットフォーム。リアルタイム採点・成績開示・参加者管理をワンストップで。">
    <meta property="og:title" content="QuizOpus - 解答採点プラットフォーム">
    <meta property="og:description" content="クイズ大会の解答採点を支援するウェブプラットフォーム">
    <meta property="og:type" content="website">
    <meta property="og:image" content="favicon.png">
    <title>QuizOpus - 問題一覧</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="js/config.js"></script>
    <script src="js/crypto.js"></script>
    <script src="js/shared.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/design_system.css">
    <link rel="stylesheet" href="css/pages.css">
</head>

<body class="page-judge">
    <div class="header-bar">
        <div class="header-left">
            <h1 id="project-title"><i class="fa-solid fa-spinner fa-spin-pulse"></i> 読み込み中...</h1>
        </div>
        <div class="header-right">
            <button class="menu-trigger" onclick="toggleMenu()">
                <div class="trigger-icon"><span></span><span></span><span></span></div>
                メニュー
            </button>
        </div>
    </div>

    <!-- Slide Panel Menu -->
    <div class="menu-backdrop" id="menu-backdrop" onclick="toggleMenu()"></div>
    <div class="menu-panel" id="menu-panel">
        <button class="menu-panel-close" onclick="toggleMenu()"><i class="fa-solid fa-xmark"></i></button>

        <div class="menu-profile">
            <div class="menu-avatar"><i class="fa-solid fa-user"></i></div>
            <div class="menu-profile-name" id="menu-scorer-name"></div>
            <div id="menu-scorer-role"></div>
        </div>

        <div id="admin-menu-section" style="display:none">
            <div class="menu-section">
                <div class="menu-section-label">管理</div>
                <button class="menu-item" onclick="location.href='admin.html'">
                    <i class="fa-solid fa-gauge"></i> 管理画面
                </button>
                <button class="menu-item warn" onclick="location.href='conflict.html'">
                    <i class="fa-solid fa-triangle-exclamation"></i> 要確認
                </button>
            </div>
            <div class="menu-divider"></div>
        </div>

        <div class="menu-section">
            <div class="menu-section-label">ツール</div>
            <button class="menu-item" onclick="location.href='checkin.html'">
                <i class="fa-solid fa-qrcode"></i> 当日受付
            </button>
            <button class="menu-item" onclick="window.open('entry.html?pid='+projectId,'_blank')">
                <i class="fa-solid fa-pen-to-square"></i> エントリーフォーム
            </button>
            <button class="menu-item" onclick="window.open('entry_list.html?pid='+projectId,'_blank')">
                <i class="fa-solid fa-list"></i> エントリーリスト
            </button>
        </div>

        <div class="menu-footer">
            <button class="menu-item danger" onclick="logout()">
                <i class="fa-solid fa-right-from-bracket"></i> ログアウト
            </button>
        </div>
    </div>



    <div class="q-grid" id="q-grid"></div>

    <script src="js/judge.js"></script>
</body>

</html>
