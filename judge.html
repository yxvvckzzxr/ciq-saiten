<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIQ the 13th 採点システム - 問題一覧</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: sans-serif;
            background: #1a1a2e;
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        .top-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        h1 {
            font-size: 20px;
        }

        .scorer-badge {
            background: #0f3460;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 13px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            background: #4caf50;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }

        .btn:hover {
            background: #388e3c;
        }

        .btn.secondary {
            background: #0f3460;
            border: 1px solid #444;
        }

        .btn.secondary:hover {
            background: #1a4a7a;
        }

        .btn.warning {
            background: #e65100;
        }

        .btn.warning:hover {
            background: #bf360c;
        }

        .admin-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            padding: 12px 16px;
            background: #16213e;
            border-radius: 10px;
            align-items: center;
        }

        .admin-label {
            font-size: 12px;
            color: #aaa;
        }

        .legend {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #aaa;
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }

        .q-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .q-card {
            background: #16213e;
            border-radius: 10px;
            padding: 10px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
            min-height: 90px;
        }

        .q-card:hover:not(.locked) {
            border-color: #4caf50;
        }

        .q-card.locked {
            cursor: not-allowed;
            opacity: 0.5;
        }

        .q-card.mine {
            border-color: #2196f3;
        }

        .q-card.inprogress {
            background: #0d2a5e;
        }

        .q-card.done {
            background: #1b3a1f;
        }

        .q-num {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 6px;
        }

        .q-scorers {
            font-size: 10px;
            color: #aaa;
            line-height: 1.8;
        }

        .q-status {
            font-size: 10px;
            margin-top: 6px;
            padding: 2px 6px;
            border-radius: 4px;
            display: inline-block;
        }

        .status-open {
            background: #333;
            color: #888;
        }

        .status-inprogress {
            background: #0d47a1;
            color: #90caf9;
        }

        .status-done {
            background: #1b5e20;
            color: #a5d6a7;
        }

        .status-locked {
            background: #333;
            color: #555;
        }
    </style>
</head>

<body>
    <div class="top-bar">
        <h1>問題一覧</h1>
        <div class="scorer-badge" id="scorer-badge"></div>
        <button class="btn secondary" style="margin-left:auto" onclick="logout()">ログアウト</button>
    </div>

    <div class="admin-bar" id="admin-bar" style="display:none">
        <span class="admin-label">管理者：</span>
        <button class="btn secondary" onclick="location.href='scoring.html'">答案設定</button>
        <button class="btn secondary" onclick="location.href='answer_setup.html'">模範解答設定</button>
        <button class="btn warning" onclick="location.href='conflict.html'">要確認一覧</button>
        <button class="btn secondary" onclick="location.href='admin.html'">管理者画面</button>
    </div>

    <div class="legend">
        <div class="legend-item">
            <div class="legend-dot" style="background:#16213e;border:1px solid #444"></div>未着手
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background:#0d2a5e"></div>採点中
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background:#1b3a1f"></div>完了
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="border:2px solid #2196f3;background:transparent"></div>自分が担当
        </div>
    </div>

    <div class="q-grid" id="q-grid"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDk-RpKCX5Hd-xNnrso_x5fd3S-vUoWKUc",
            authDomain: "ciq-saiten.firebaseapp.com",
            databaseURL: "https://ciq-saiten-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ciq-saiten",
            storageBucket: "ciq-saiten.firebasestorage.app",
            messagingSenderId: "987606904586",
            appId: "1:987606904586:web:b16876b8963a55a60d94f3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const projectId = sessionStorage.getItem('projectId');
        const scorerName = sessionStorage.getItem('scorer_name');
        const scorerRole = sessionStorage.getItem('scorer_role');

        if (!projectId || !scorerName) location.href = 'index.html';

        let GAS_URL = '';
        let totalQuestions = 100;

        async function initializeApp() {
            // プロジェクト設定を取得
            const snapConfig = await db.ref(`projects/${projectId}/config`).once('value');
            if (snapConfig.exists()) {
                totalQuestions = snapConfig.val().questionCount || 100;
            }
            const snapSettings = await db.ref(`projects/${projectId}/settings`).once('value');
            if (snapSettings.exists()) {
                GAS_URL = snapSettings.val().gasUrl || '';
            }

            if (GAS_URL) {
                fetchMasterData();
            }

            document.getElementById('scorer-badge').textContent =
                `${scorerName}（${scorerRole === 'admin' ? '管理者' : '採点者'}）`;

            if (scorerRole === 'admin') {
                document.getElementById('admin-bar').style.display = 'flex';
            }

            const qGrid = document.getElementById('q-grid');
            qGrid.innerHTML = ''; // クリア
            for (let i = 1; i <= totalQuestions; i++) {
                const card = document.createElement('div');
                card.className = 'q-card';
                card.id = `qcard-${i}`;
                card.innerHTML = `
            <div class="q-num">${i}問</div>
            <div class="q-scorers" id="qscorers-${i}"></div>
            <div class="q-status status-open" id="qstatus-${i}">未着手</div>
          `;
                card.onclick = () => enterQ(i);
                qGrid.appendChild(card);
            }

            db.ref(`projects/${projectId}/scores`).on('value', snap => {
                updateGrid(snap.val() || {});
            });
        }
        
        async function fetchMasterData() {
        }

        function updateGrid(scores) {
            for (let q = 1; q <= totalQuestions; q++) {
                const scorers = new Set();
                Object.keys(scores).forEach(key => {
                    if (key.startsWith('__')) return;
                    const qScores = scores[key]?.[`q${q}`] || {};
                    Object.keys(qScores).forEach(name => scorers.add(name));
                });
                const scorerReg = scores[`__scorers__q${q}`] || {};
                Object.keys(scorerReg).forEach(name => scorers.add(name));

                const scorerList = [...scorers];
                const completedScorers = Object.keys(scores[`__completed__q${q}`] || {});
                const isMine = scorerList.includes(scorerName);
                const isFull = scorerList.length >= 3 && !isMine;
                const allDone = scorerList.length >= 3 && completedScorers.length >= 3;

                const card = document.getElementById(`qcard-${q}`);
                const statusEl = document.getElementById(`qstatus-${q}`);
                const scorersEl = document.getElementById(`qscorers-${q}`);

                card.className = 'q-card';
                if (isMine) card.classList.add('mine');
                if (isFull) card.classList.add('locked');
                if (allDone) card.classList.add('done');
                else if (scorerList.length > 0) card.classList.add('inprogress');

                scorersEl.innerHTML = scorerList.map(name => {
                    const done = completedScorers.includes(name);
                    return `${done ? '✓' : '…'} ${name}`;
                }).join('<br>');

                if (isFull && !isMine) {
                    statusEl.className = 'q-status status-locked';
                    statusEl.textContent = '満員';
                } else if (allDone) {
                    statusEl.className = 'q-status status-done';
                    statusEl.textContent = '完了';
                } else if (scorerList.length > 0) {
                    statusEl.className = 'q-status status-inprogress';
                    statusEl.textContent = `採点中 ${scorerList.length}/3`;
                } else {
                    statusEl.className = 'q-status status-open';
                    statusEl.textContent = '未着手';
                }
            }
        }

        function enterQ(q) {
            const card = document.getElementById(`qcard-${q}`);
            if (card.classList.contains('locked')) return;
            sessionStorage.setItem('current_q', q);
            location.href = 'question.html';
        }

        function logout() {
            sessionStorage.clear();
            location.href = 'index.html';
        }
        
        initializeApp();
    </script>
</body>

</html>
